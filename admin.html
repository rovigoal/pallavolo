<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Admin - Rovigol Pallavolo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        .alert-success { background-color: #d4edda; color: #155724; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .alert-error { background-color: #f8d7da; color: #721c24; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .btn-danger { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .btn-danger:hover { background-color: #c82333; }
    </style>
</head>
<body>
    <header>
        <h1>Area Admin</h1>
        <nav><a href="main.html">Torna alla Home</a></nav>
    </header>

    <main class="container" style="flex-direction: column;">
        <div id="password-protection">
            <h2>Inserisci password</h2>
            <input type="password" id="password-input" placeholder="Password">
            <button onclick="verificaPassword()">Accedi</button>
        </div>

        <div id="admin-content" style="display: none;">
            <div id="messageBox"></div>

            <!-- Gestione Squadre -->
            <section class="riquadro">
                <h2>Gestione Squadre</h2>
                <form id="formSquadra">
                    <input type="text" id="nomeSquadra" placeholder="Nome squadra" required>
                    <button type="submit">Aggiungi Squadra</button>
                </form>
                <h3>Elenco Squadre</h3>
                <ul id="listaSquadre"></ul>
                <button class="btn-danger" onclick="eliminaTutteSquadre()">Elimina TUTTE le squadre</button>
            </section>

            <!-- Gestione Giocatori -->
            <section class="riquadro">
                <h2>Gestione Giocatori</h2>
                <form id="formGiocatore">
                    <input type="text" id="nomeGiocatore" placeholder="Nome giocatore" required>
                    <select id="squadraGiocatore" required>
                        <option value="">Seleziona squadra</option>
                    </select>
                    <input type="text" id="ruoloGiocatore" placeholder="Ruolo" required>
                    <button type="submit">Aggiungi Giocatore</button>
                </form>
                <h3>Elenco Giocatori</h3>
                <ul id="listaGiocatori"></ul>
                <button class="btn-danger" onclick="eliminaTuttiGiocatori()">Elimina TUTTI i giocatori</button>
            </section>

            <!-- Inserisci risultato partita CON MIGLIOR GIOCATORE -->
            <section class="riquadro">
                <h2>Inserisci risultato partita</h2>
                <form id="formPartita">
                    <select id="squadraCasa" required>
                        <option value="">Squadra casa</option>
                    </select>
                    <input type="number" id="setCasa" min="0" max="3" placeholder="Set casa" required>
                    
                    <select id="squadraOspite" required>
                        <option value="">Squadra ospite</option>
                    </select>
                    <input type="number" id="setOspite" min="0" max="3" placeholder="Set ospite" required>
                    
                    <!-- NUOVO: Selezione miglior giocatore -->
                    <select id="migliorGiocatore" required>
                        <option value="">Miglior giocatore della partita</option>
                    </select>
                    
                    <button type="submit">Registra partita</button>
                </form>
                <h3>Elenco Partite</h3>
                <ul id="listaPartite"></ul>
                <button class="btn-danger" onclick="eliminaTuttePartite()">Elimina TUTTE le partite</button>
            </section>

            <section class="riquadro" style="background-color: #ffe6e6;">
                <h2 style="color: #dc3545;">Pericolo</h2>
                <p>Questa operazione cancellerà TUTTI i dati.</p>
                <button class="btn-danger" onclick="eliminaTutto()">ELIMINA TUTTO</button>
            </section>
        </div>
    </main>

    <script>
        function mostraMessaggio(testo, tipo = 'success') {
            const box = document.getElementById('messageBox');
            box.innerHTML = `<div class="alert-${tipo}">${testo}</div>`;
            setTimeout(() => { box.innerHTML = ''; }, 3000);
        }

        function verificaPassword() {
            const psw = document.getElementById('password-input').value;
            if (psw === '123') {
                document.getElementById('password-protection').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                caricaDatiAdmin();
            } else {
                alert('Password errata!');
            }
        }

        async function caricaSquadreSelect(selectId) {
            const { data: squadre } = await supabaseClient.from('squadre').select('*');
            const select = document.getElementById(selectId);
            if (!select) return;
            select.innerHTML = '<option value="">Seleziona squadra</option>';
            squadre.forEach(s => {
                select.innerHTML += `<option value="${s.id}">${s.nome}</option>`;
            });
        }

        async function caricaGiocatoriSelect(selectId, squadraId = null) {
            let query = supabaseClient.from('giocatori').select('id, nome, squadre!inner(nome)');
            if (squadraId) {
                query = query.eq('squadra_id', squadraId);
            }
            const { data: giocatori } = await query;
            
            const select = document.getElementById(selectId);
            if (!select) return;
            select.innerHTML = '<option value="">Seleziona giocatore</option>';
            giocatori.forEach(g => {
                select.innerHTML += `<option value="${g.id}">${g.nome}</option>`;
            });
        }

        // NUOVA: Aggiorna la lista dei giocatori in base alla squadra selezionata
        function aggiornaMigliorGiocatore() {
            const squadraCasa = document.getElementById('squadraCasa').value;
            const squadraOspite = document.getElementById('squadraOspite').value;
            
            if (squadraCasa && squadraOspite) {
                caricaGiocatoriPerMigliore(squadraCasa, squadraOspite);
            }
        }

        async function caricaGiocatoriPerMigliore(squadraCasaId, squadraOspiteId) {
            const { data: giocatoriCasa } = await supabaseClient
                .from('giocatori')
                .select('id, nome')
                .eq('squadra_id', squadraCasaId);
                
            const { data: giocatoriOspite } = await supabaseClient
                .from('giocatori')
                .select('id, nome')
                .eq('squadra_id', squadraOspiteId);
            
            const tutti = [...(giocatoriCasa || []), ...(giocatoriOspite || [])];
            
            const select = document.getElementById('migliorGiocatore');
            select.innerHTML = '<option value="">Miglior giocatore</option>';
            tutti.forEach(g => {
                select.innerHTML += `<option value="${g.id}">${g.nome}</option>`;
            });
        }

        async function aggiornaListaSquadre() {
            const { data: squadre } = await supabaseClient.from('squadre').select('*');
            let html = '';
            squadre.forEach(s => html += `<li>${s.nome} <button class="btn-danger" onclick="eliminaSquadra('${s.id}')">Elimina</button></li>`);
            document.getElementById('listaSquadre').innerHTML = html;
        }

        async function aggiornaListaGiocatori() {
            const { data: giocatori } = await supabaseClient
                .from('giocatori')
                .select('id, nome, ruolo, squadre!inner(nome)');
            let html = '';
            giocatori.forEach(g => html += `<li>${g.nome} - ${g.ruolo} (${g.squadre.nome}) <button class="btn-danger" onclick="eliminaGiocatore('${g.id}')">Elimina</button></li>`);
            document.getElementById('listaGiocatori').innerHTML = html;
        }

        async function aggiornaListaPartite() {
            const { data: partite } = await supabaseClient
                .from('partite')
                .select('id, set_casa, set_ospite, squadre!squadra_casa_id(nome), squadre!squadra_ospite_id(nome)');
            let html = '';
            partite.forEach(p => html += `<li>${p.squadre_casa_id.nome} vs ${p.squadre_ospite_id.nome} (${p.set_casa}-${p.set_ospite}) <button class="btn-danger" onclick="eliminaPartita('${p.id}')">Elimina</button></li>`);
            document.getElementById('listaPartite').innerHTML = html;
        }

        window.eliminaSquadra = async (id) => {
            if (confirm('Sicuro?')) {
                await supabaseClient.from('squadre').delete().eq('id', id);
                aggiornaListaSquadre();
                caricaSquadreSelect('squadraGiocatore');
                caricaSquadreSelect('squadraCasa');
                caricaSquadreSelect('squadraOspite');
                mostraMessaggio('Squadra eliminata!');
            }
        };

        window.eliminaGiocatore = async (id) => {
            if (confirm('Sicuro?')) {
                await supabaseClient.from('giocatori').delete().eq('id', id);
                aggiornaListaGiocatori();
                mostraMessaggio('Giocatore eliminato!');
            }
        };

        window.eliminaPartita = async (id) => {
            if (confirm('Sicuro?')) {
                await supabaseClient.from('partite').delete().eq('id', id);
                aggiornaListaPartite();
                mostraMessaggio('Partita eliminata!');
            }
        };

        window.eliminaTutteSquadre = async () => {
            if (confirm('ELIMINARE TUTTE LE SQUADRE?')) {
                await supabaseClient.from('squadre').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                aggiornaListaSquadre();
                aggiornaListaGiocatori();
                aggiornaListaPartite();
                caricaSquadreSelect('squadraGiocatore');
                caricaSquadreSelect('squadraCasa');
                caricaSquadreSelect('squadraOspite');
                mostraMessaggio('Tutte le squadre eliminate!');
            }
        };

        window.eliminaTuttiGiocatori = async () => {
            if (confirm('ELIMINARE TUTTI I GIOCATORI?')) {
                await supabaseClient.from('giocatori').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                aggiornaListaGiocatori();
                mostraMessaggio('Tutti i giocatori eliminati!');
            }
        };

        window.eliminaTuttePartite = async () => {
            if (confirm('ELIMINARE TUTTE LE PARTITE?')) {
                await supabaseClient.from('partite').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                aggiornaListaPartite();
                mostraMessaggio('Tutte le partite eliminate!');
            }
        };

        window.eliminaTutto = async () => {
            if (confirm('⚠️ ELIMINARE TUTTO?')) {
                await supabaseClient.from('premi').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('partite').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('giocatori').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('squadre').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                aggiornaListaSquadre();
                aggiornaListaGiocatori();
                aggiornaListaPartite();
                caricaSquadreSelect('squadraGiocatore');
                caricaSquadreSelect('squadraCasa');
                caricaSquadreSelect('squadraOspite');
                mostraMessaggio('Tutti i dati cancellati!');
            }
        };

        function caricaDatiAdmin() {
            caricaSquadreSelect('squadraGiocatore');
            caricaSquadreSelect('squadraCasa');
            caricaSquadreSelect('squadraOspite');
            aggiornaListaSquadre();
            aggiornaListaGiocatori();
            aggiornaListaPartite();

            // Event listeners per aggiornare i giocatori quando cambiano le squadre
            document.getElementById('squadraCasa').addEventListener('change', aggiornaMigliorGiocatore);
            document.getElementById('squadraOspite').addEventListener('change', aggiornaMigliorGiocatore);

            document.getElementById('formSquadra').addEventListener('submit', async (e) => {
                e.preventDefault();
                const nome = document.getElementById('nomeSquadra').value;
                await supabaseClient.from('squadre').insert({ nome, punti: 0, partite_giocate: 0, vinte: 0, perse: 0 });
                document.getElementById('nomeSquadra').value = '';
                aggiornaListaSquadre();
                caricaSquadreSelect('squadraGiocatore');
                caricaSquadreSelect('squadraCasa');
                caricaSquadreSelect('squadraOspite');
                mostraMessaggio('Squadra aggiunta!');
            });

            document.getElementById('formGiocatore').addEventListener('submit', async (e) => {
                e.preventDefault();
                const nome = document.getElementById('nomeGiocatore').value;
                const squadraId = document.getElementById('squadraGiocatore').value;
                const ruolo = document.getElementById('ruoloGiocatore').value;
                await supabaseClient.from('giocatori').insert({ nome, squadra_id: squadraId, ruolo });
                document.getElementById('nomeGiocatore').value = '';
                document.getElementById('ruoloGiocatore').value = '';
                aggiornaListaGiocatori();
                mostraMessaggio('Giocatore aggiunto!');
            });

            document.getElementById('formPartita').addEventListener('submit', async (e) => {
                e.preventDefault();
                const casaId = document.getElementById('squadraCasa').value;
                const ospiteId = document.getElementById('squadraOspite').value;
                const setCasa = parseInt(document.getElementById('setCasa').value);
                const setOspite = parseInt(document.getElementById('setOspite').value);
                const migliorGiocatoreId = document.getElementById('migliorGiocatore').value;

                if (casaId === ospiteId) {
                    alert('Le squadre devono essere diverse');
                    return;
                }

                if (!migliorGiocatoreId) {
                    alert('Seleziona il miglior giocatore');
                    return;
                }

                // Calcolo punti
                let puntiCasa, puntiOspite;
                if (setCasa > setOspite) {
                    if (setCasa === 3 && (setOspite === 0 || setOspite === 1)) {
                        puntiCasa = 3; puntiOspite = 0;
                    } else if (setCasa === 3 && setOspite === 2) {
                        puntiCasa = 2; puntiOspite = 1;
                    } else {
                        alert('Risultato non valido');
                        return;
                    }
                } else if (setOspite > setCasa) {
                    if (setOspite === 3 && (setCasa === 0 || setCasa === 1)) {
                        puntiCasa = 0; puntiOspite = 3;
                    } else if (setOspite === 3 && setCasa === 2) {
                        puntiCasa = 1; puntiOspite = 2;
                    } else {
                        alert('Risultato non valido');
                        return;
                    }
                } else {
                    alert('Il risultato non può essere un pareggio');
                    return;
                }

                // Inserisci partita
                const { data: partita, error } = await supabaseClient.from('partite').insert({
                    squadra_casa_id: casaId,
                    squadra_ospite_id: ospiteId,
                    set_casa: setCasa,
                    set_ospite: setOspite,
                    data: new Date()
                }).select();

                if (error) {
                    alert('Errore nel salvare la partita');
                    return;
                }

                // Inserisci premio miglior giocatore
                const partitaId = partita[0].id;
                await supabaseClient.from('premi').insert({
                    partita_id: partitaId,
                    giocatore_id: migliorGiocatoreId,
                    data: new Date()
                });

                // Aggiorna statistiche squadre
                await aggiornaStatisticheSquadra(casaId, puntiCasa, setCasa > setOspite);
                await aggiornaStatisticheSquadra(ospiteId, puntiOspite, setOspite > setCasa);

                document.getElementById('setCasa').value = '';
                document.getElementById('setOspite').value = '';
                document.getElementById('migliorGiocatore').innerHTML = '<option value="">Miglior giocatore</option>';
                aggiornaListaPartite();
                mostraMessaggio('Partita registrata con miglior giocatore!');
            });

            async function aggiornaStatisticheSquadra(squadraId, punti, vinta) {
                const { data: squadra } = await supabaseClient.from('squadre').select('*').eq('id', squadraId).single();
                const nuoveStat = {
                    punti: squadra.punti + punti,
                    partite_giocate: squadra.partite_giocate + 1,
                    vinte: squadra.vinte + (vinta ? 1 : 0),
                    perse: squadra.perse + (vinta ? 0 : 1)
                };
                await supabaseClient.from('squadre').update(nuoveStat).eq('id', squadraId);
            }
        }
    </script>
</body>
</html>
