<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Squadre e Giocatori</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        /* Stili identici a prima */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; }
        header { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; padding: 1.5rem 2rem; }
        header h1 { font-size: 2rem; }
        nav a { color: #f97316; text-decoration: none; margin-top: 0.5rem; display: inline-block; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }
        .card { background: white; border-radius: 20px; padding: 1.8rem; margin-bottom: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .card h2 { font-size: 1.5rem; color: #f97316; border-bottom: 2px solid #f97316; padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
        .card h3 { font-size: 1.1rem; color: #334155; margin: 1.2rem 0 0.8rem; }
        form { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1.5rem; }
        input, select, button { padding: 0.7rem 1rem; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 0.95rem; outline: none; }
        button { background: #f97316; color: white; border: none; cursor: pointer; }
        button:hover { background: #ea580c; }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-small { padding: 0.3rem 0.8rem; font-size: 0.8rem; margin-left: 0.5rem; }
        ul { list-style: none; max-height: 300px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 12px; padding: 0.5rem; }
        li { background: #f8fafc; padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; border-left: 4px solid #f97316; }
        .alert-success { background: #d1fae5; color: #065f46; padding: 1rem; border-radius: 12px; margin-bottom: 1rem; }
        .alert-error { background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 12px; margin-bottom: 1rem; }
        #password-protection { max-width: 400px; margin: 4rem auto; text-align: center; }
        #password-protection input { width: 100%; margin: 1rem 0; }
        #password-protection button { width: 100%; }
        .link-button { display: inline-block; background: #f97316; color: white; padding: 0.7rem 1.5rem; border-radius: 12px; text-decoration: none; margin-top: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>🔧 Admin - Squadre e Giocatori</h1>
        <nav>
            <a href="main.html">← Home</a>
            <a href="inserisci-partite.html" style="background: #f97316; color: white; padding: 0.5rem 1rem; border-radius: 30px; margin-left: 1rem;">➕ Inserisci Partite</a>
        </nav>
    </header>

    <main>
        <div id="password-protection" class="card">
            <h2>Accesso Admin</h2>
            <input type="password" id="password-input" placeholder="Password">
            <button id="login-button">Accedi</button>
        </div>

        <div id="admin-content" style="display: none;" class="container">
            <div id="messageBox"></div>

            <div class="card">
                <h2>🏐 Squadre</h2>
                <form id="formSquadra" onsubmit="return false;">
                    <input type="text" id="nomeSquadra" placeholder="Nome squadra" required style="flex: 1;">
                    <button type="button" onclick="aggiungiSquadra()">Aggiungi</button>
                </form>
                <h3>Elenco Squadre</h3>
                <ul id="listaSquadre"></ul>
                <button class="btn-danger" onclick="eliminaTutteSquadre()">🗑️ Elimina TUTTE le squadre</button>
            </div>

            <div class="card">
                <h2>👤 Giocatori</h2>
                <form id="formGiocatore" onsubmit="return false;">
                    <input type="text" id="nomeGiocatore" placeholder="Nome giocatore" required style="flex: 1;">
                    <select id="squadraGiocatore" required style="min-width: 150px;">
                        <option value="">Seleziona squadra</option>
                    </select>
                    <button type="button" onclick="aggiungiGiocatore()">Aggiungi</button>
                </form>
                <h3>Elenco Giocatori</h3>
                <ul id="listaGiocatori"></ul>
                <button class="btn-danger" onclick="eliminaTuttiGiocatori()">🗑️ Elimina TUTTI i giocatori</button>
            </div>

            <div class="card" style="background-color: #fff1f0; border-color: #dc2626;">
                <h2 style="color: #dc2626;">⚠️ Pericolo</h2>
                <p>Elimina TUTTI i dati (squadre, giocatori, partite, premi).</p>
                <button class="btn-danger" onclick="eliminaTutto()">🔥 ELIMINA TUTTO 🔥</button>
            </div>
        </div>
    </main>

    <script>
        function mostraMessaggio(testo, tipo = 'success') {
            const box = document.getElementById('messageBox');
            if (!box) return;
            box.innerHTML = `<div class="alert-${tipo}">${testo}</div>`;
            setTimeout(() => { box.innerHTML = ''; }, 4000);
        }

        function verificaPassword() {
            const psw = document.getElementById('password-input').value;
            if (psw === '123') {
                document.getElementById('password-protection').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                caricaDatiAdmin();
                mostraMessaggio('✅ Login effettuato');
            } else {
                alert('Password errata!');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('login-button').onclick = function(e) {
                e.preventDefault();
                verificaPassword();
            };
        });

        let squadre = [];
        let giocatori = [];

        async function caricaDatiAdmin() {
            await caricaSquadre();
            await caricaGiocatori();
            await aggiornaListe();
        }

        async function caricaSquadre() {
            const { data } = await supabaseClient.from('squadre').select('*');
            squadre = data || [];
        }

        async function caricaGiocatori() {
            const { data } = await supabaseClient.from('giocatori').select('id, nome, punteggio_totale, squadra_id');
            giocatori = data || [];
        }

        async function aggiornaListe() {
            await aggiornaListaSquadre();
            await aggiornaListaGiocatori();
            aggiornaSelect();
        }

        function aggiornaSelect() {
            const select = document.getElementById('squadraGiocatore');
            if (select) {
                select.innerHTML = '<option value="">Seleziona squadra</option>';
                squadre.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.nome}</option>`;
                });
            }
        }

        async function aggiornaListaSquadre() {
            const { data } = await supabaseClient.from('squadre').select('*');
            let html = '';
            (data || []).forEach(s => {
                html += `<li>
                    <span><strong>${s.nome}</strong> (Punti: ${s.punti})</span>
                    <button class="btn-danger btn-small" onclick="eliminaSquadra('${s.id}')">Elimina</button>
                </li>`;
            });
            document.getElementById('listaSquadre').innerHTML = html;
        }

        async function aggiornaListaGiocatori() {
            const { data } = await supabaseClient
                .from('giocatori')
                .select('id, nome, punteggio_totale, squadre!inner(nome)')
                .order('punteggio_totale', { ascending: false });
            let html = '';
            (data || []).forEach(g => {
                html += `<li>
                    <span><strong>${g.nome}</strong> - Punti: ${g.punteggio_totale} - ${g.squadre.nome}</span>
                    <button class="btn-danger btn-small" onclick="eliminaGiocatore('${g.id}')">Elimina</button>
                </li>`;
            });
            document.getElementById('listaGiocatori').innerHTML = html;
        }

        async function aggiungiSquadra() {
            const nome = document.getElementById('nomeSquadra').value.trim();
            if (!nome) return mostraMessaggio('❌ Inserisci un nome', 'error');
            try {
                await supabaseClient.from('squadre').insert({ nome, punti:0, partite_giocate:0, vinte:0, perse:0 });
                document.getElementById('nomeSquadra').value = '';
                await caricaSquadre();
                await aggiornaListe();
                mostraMessaggio('✅ Squadra aggiunta!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        }

        async function aggiungiGiocatore() {
            const nome = document.getElementById('nomeGiocatore').value.trim();
            const squadraId = document.getElementById('squadraGiocatore').value;
            if (!nome || !squadraId) return mostraMessaggio('❌ Compila tutti i campi', 'error');
            try {
                await supabaseClient.from('giocatori').insert({ nome, squadra_id: squadraId, punteggio_totale:0 });
                document.getElementById('nomeGiocatore').value = '';
                await caricaGiocatori();
                await aggiornaListe();
                mostraMessaggio('✅ Giocatore aggiunto!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        }

        window.eliminaSquadra = async (id) => {
            if (!confirm('Sicuro?')) return;
            try {
                await supabaseClient.from('squadre').delete().eq('id', id);
                await caricaSquadre();
                await caricaGiocatori();
                await aggiornaListe();
                mostraMessaggio('✅ Squadra eliminata!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        window.eliminaGiocatore = async (id) => {
            if (!confirm('Sicuro?')) return;
            try {
                await supabaseClient.from('giocatori').delete().eq('id', id);
                await caricaGiocatori();
                await aggiornaListe();
                mostraMessaggio('✅ Giocatore eliminato!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        window.eliminaTuttiGiocatori = async () => {
            if (!confirm('ELIMINARE TUTTI I GIOCATORI?')) return;
            try {
                await supabaseClient.from('giocatori').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await caricaGiocatori();
                await aggiornaListe();
                mostraMessaggio('✅ Giocatori eliminati!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        window.eliminaTutteSquadre = async () => {
            if (!confirm('ELIMINARE TUTTE LE SQUADRE?')) return;
            try {
                await supabaseClient.from('premi').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('partite').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('giocatori').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('squadre').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await caricaSquadre();
                await caricaGiocatori();
                await aggiornaListe();
                mostraMessaggio('✅ Tutte le squadre eliminate!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        window.eliminaTutto = async () => {
            if (!confirm('⚠️ STAI PER ELIMINARE TUTTO. SICURO?')) return;
            try {
                await supabaseClient.from('premi').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('partite').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('giocatori').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('squadre').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await caricaSquadre();
                await caricaGiocatori();
                await aggiornaListe();
                mostraMessaggio('✅ Tutto eliminato!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };
    </script>
</body>
</html>
