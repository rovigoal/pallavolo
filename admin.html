<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Rovigol Pallavolo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        .alert-success { 
            background-color: #d4edda; 
            color: #155724; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 1px solid #c3e6cb;
            font-weight: bold;
            text-align: center;
        }
        .alert-error { 
            background-color: #f8d7da; 
            color: #721c24; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 1px solid #f5c6cb;
            font-weight: bold;
            text-align: center;
        }
        .btn-danger { 
            background-color: #dc3545; 
            color: white; 
            border: none; 
            padding: 5px 10px; 
            border-radius: 3px; 
            cursor: pointer; 
            margin-left: 10px;
        }
        .btn-danger:hover { 
            background-color: #c82333; 
        }
        .riquadro {
            margin-bottom: 30px;
            padding: 20px;
        }
        ul li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        input, select, button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #f97316;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #e65c00;
        }
    </style>
</head>
<body>
    <header>
        <h1>Area Admin</h1>
        <nav><a href="main.html">Torna alla Home</a></nav>
    </header>

    <main class="container" style="flex-direction: column; max-width: 800px; margin: 0 auto;">
        <!-- Protezione con password -->
        <div id="password-protection" class="riquadro" style="text-align: center;">
            <h2>Inserisci password</h2>
            <input type="password" id="password-input" placeholder="Password">
            <button onclick="verificaPassword()">Accedi</button>
        </div>

        <div id="admin-content" style="display: none;">
            <div id="messageBox"></div>

            <!-- Gestione Squadre -->
            <section class="riquadro">
                <h2>🏐 Gestione Squadre</h2>
                <form id="formSquadra">
                    <input type="text" id="nomeSquadra" placeholder="Nome squadra" required style="flex: 1;">
                    <button type="submit">Aggiungi Squadra</button>
                </form>
                <h3>Elenco Squadre</h3>
                <ul id="listaSquadre"></ul>
                <button class="btn-danger" onclick="eliminaTutteSquadre()">🗑️ Elimina TUTTE le squadre</button>
            </section>

            <!-- Gestione Giocatori (con voto) -->
            <section class="riquadro">
                <h2>👤 Gestione Giocatori</h2>
                <form id="formGiocatore">
                    <input type="text" id="nomeGiocatore" placeholder="Nome giocatore" required style="flex: 1;">
                    <select id="squadraGiocatore" required style="min-width: 150px;">
                        <option value="">Seleziona squadra</option>
                    </select>
                    <input type="number" id="votoGiocatore" placeholder="Voto (0-99)" min="0" max="99" step="1" required style="width: 100px;">
                    <button type="submit">Aggiungi</button>
                </form>
                <h3>Elenco Giocatori</h3>
                <ul id="listaGiocatori"></ul>
                <button class="btn-danger" onclick="eliminaTuttiGiocatori()">🗑️ Elimina TUTTI i giocatori</button>
            </section>

            <!-- Inserisci risultato partita -->
            <section class="riquadro">
                <h2>📊 Inserisci risultato partita</h2>
                <form id="formPartita">
                    <select id="squadraCasa" required style="flex: 1;">
                        <option value="">Squadra casa</option>
                    </select>
                    <input type="number" id="setCasa" min="0" max="3" placeholder="Set casa" required style="width: 80px;">
                    
                    <select id="squadraOspite" required style="flex: 1;">
                        <option value="">Squadra ospite</option>
                    </select>
                    <input type="number" id="setOspite" min="0" max="3" placeholder="Set ospite" required style="width: 80px;">
                    
                    <select id="migliorGiocatore" required style="flex: 2;">
                        <option value="">Miglior giocatore</option>
                    </select>
                    
                    <input type="number" id="votoMigliore" placeholder="Voto (0-99)" min="0" max="99" step="1" required style="width: 100px;">
                    
                    <button type="submit">Registra</button>
                </form>
                <h3>Elenco Partite</h3>
                <ul id="listaPartite"></ul>
                <button class="btn-danger" onclick="eliminaTuttePartite()">🗑️ Elimina TUTTE le partite</button>
            </section>

            <!-- Pericolo -->
            <section class="riquadro" style="background-color: #ffe6e6;">
                <h2 style="color: #dc3545;">⚠️ Pericolo</h2>
                <p>Questa operazione cancellerà TUTTI i dati.</p>
                <button class="btn-danger" onclick="eliminaTutto()">🔥 ELIMINA TUTTO 🔥</button>
            </section>
        </div>
    </main>

    <script>
        function mostraMessaggio(testo, tipo = 'success') {
            const box = document.getElementById('messageBox');
            box.innerHTML = `<div class="alert-${tipo}">${testo}</div>`;
            setTimeout(() => { box.innerHTML = ''; }, 4000);
        }

        function verificaPassword() {
            const psw = document.getElementById('password-input').value;
            if (psw === '123') {
                document.getElementById('password-protection').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                caricaDatiAdmin();
                mostraMessaggio('✅ Login effettuato');
            } else {
                alert('Password errata!');
            }
        }

        async function caricaSquadreSelect(selectId) {
            const { data: squadre } = await supabaseClient.from('squadre').select('*');
            const select = document.getElementById(selectId);
            if (!select) return;
            select.innerHTML = '<option value="">Seleziona squadra</option>';
            squadre.forEach(s => {
                select.innerHTML += `<option value="${s.id}">${s.nome}</option>`;
            });
        }

        async function caricaGiocatoriPerMigliore() {
            const casaId = document.getElementById('squadraCasa').value;
            const ospiteId = document.getElementById('squadraOspite').value;
            
            if (!casaId || !ospiteId) return;
            
            const { data: giocatoriCasa } = await supabaseClient
                .from('giocatori')
                .select('id, nome, voto')
                .eq('squadra_id', casaId);
                
            const { data: giocatoriOspite } = await supabaseClient
                .from('giocatori')
                .select('id, nome, voto')
                .eq('squadra_id', ospiteId);
            
            const tutti = [...(giocatoriCasa || []), ...(giocatoriOspite || [])];
            
            const select = document.getElementById('migliorGiocatore');
            select.innerHTML = '<option value="">Miglior giocatore</option>';
            tutti.forEach(g => {
                select.innerHTML += `<option value="${g.id}">${g.nome} (voto attuale: ${g.voto})</option>`;
            });
        }

        async function aggiornaListaSquadre() {
            const { data: squadre } = await supabaseClient.from('squadre').select('*');
            let html = '';
            squadre.forEach(s => {
                html += `<li>
                    <span><strong>${s.nome}</strong> (Punti: ${s.punti})</span>
                    <button class="btn-danger" onclick="eliminaSquadra('${s.id}')">Elimina</button>
                </li>`;
            });
            document.getElementById('listaSquadre').innerHTML = html;
        }

        async function aggiornaListaGiocatori() {
            const { data: giocatori } = await supabaseClient
                .from('giocatori')
                .select('id, nome, voto, squadre!inner(nome)')
                .order('voto', { ascending: false });
            let html = '';
            giocatori.forEach(g => {
                html += `<li>
                    <span><strong>${g.nome}</strong> - Voto: ${g.voto} (${g.squadre.nome})</span>
                    <button class="btn-danger" onclick="eliminaGiocatore('${g.id}')">Elimina</button>
                </li>`;
            });
            document.getElementById('listaGiocatori').innerHTML = html;
        }

        async function aggiornaListaPartite() {
            const { data: partite } = await supabaseClient
                .from('partite')
                .select('id, set_casa, set_ospite, squadre!squadra_casa_id(nome), squadre!squadra_ospite_id(nome)')
                .order('data', { ascending: false });
            let html = '';
            partite.forEach(p => {
                html += `<li>
                    <span><strong>${p.squadre_casa_id.nome} vs ${p.squadre_ospite_id.nome}</strong> (${p.set_casa}-${p.set_ospite})</span>
                    <button class="btn-danger" onclick="eliminaPartita('${p.id}')">Elimina</button>
                </li>`;
            });
            document.getElementById('listaPartite').innerHTML = html;
        }

        window.eliminaSquadra = async (id) => {
            if (confirm('Sicuro?')) {
                await supabaseClient.from('squadre').delete().eq('id', id);
                aggiornaListaSquadre();
                aggiornaListaGiocatori();
                aggiornaListaPartite();
                caricaSquadreSelect('squadraGiocatore');
                caricaSquadreSelect('squadraCasa');
                caricaSquadreSelect('squadraOspite');
                mostraMessaggio('✅ Squadra eliminata!');
            }
        };

        window.eliminaGiocatore = async (id) => {
            if (confirm('Sicuro?')) {
                await supabaseClient.from('giocatori').delete().eq('id', id);
                aggiornaListaGiocatori();
                mostraMessaggio('✅ Giocatore eliminato!');
            }
        };

        window.eliminaPartita = async (id) => {
            if (confirm('Sicuro?')) {
                await supabaseClient.from('partite').delete().eq('id', id);
                aggiornaListaPartite();
                mostraMessaggio('✅ Partita eliminata!');
            }
        };

        window.eliminaTutteSquadre = async () => {
            if (confirm('ELIMINARE TUTTE LE SQUADRE?')) {
                await supabaseClient.from('premi').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('partite').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('giocatori').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('squadre').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                aggiornaListaSquadre();
                aggiornaListaGiocatori();
                aggiornaListaPartite();
                caricaSquadreSelect('squadraGiocatore');
                caricaSquadreSelect('squadraCasa');
                caricaSquadreSelect('squadraOspite');
                mostraMessaggio('✅ Tutte le squadre eliminate!');
            }
        };

        window.eliminaTuttiGiocatori = async () => {
            if (confirm('ELIMINARE TUTTI I GIOCATORI?')) {
                await supabaseClient.from('giocatori').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                aggiornaListaGiocatori();
                mostraMessaggio('✅ Tutti i giocatori eliminati!');
            }
        };

        window.eliminaTuttePartite = async () => {
            if (confirm('ELIMINARE TUTTE LE PARTITE?')) {
                await supabaseClient.from('premi').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('partite').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                aggiornaListaPartite();
                mostraMessaggio('✅ Tutte le partite eliminate!');
            }
        };

        window.eliminaTutto = async () => {
            if (confirm('ELIMINARE TUTTO?')) {
                await supabaseClient.from('premi').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('partite').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('giocatori').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('squadre').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                aggiornaListaSquadre();
                aggiornaListaGiocatori();
                aggiornaListaPartite();
                caricaSquadreSelect('squadraGiocatore');
                caricaSquadreSelect('squadraCasa');
                caricaSquadreSelect('squadraOspite');
                mostraMessaggio('✅ Tutto eliminato!');
            }
        };

        function caricaDatiAdmin() {
            caricaSquadreSelect('squadraGiocatore');
            caricaSquadreSelect('squadraCasa');
            caricaSquadreSelect('squadraOspite');
            aggiornaListaSquadre();
            aggiornaListaGiocatori();
            aggiornaListaPartite();

            document.getElementById('squadraCasa').addEventListener('change', caricaGiocatoriPerMigliore);
            document.getElementById('squadraOspite').addEventListener('change', caricaGiocatoriPerMigliore);

            // Form Squadra
            document.getElementById('formSquadra').addEventListener('submit', async (e) => {
                e.preventDefault();
                const nome = document.getElementById('nomeSquadra').value.trim();
                if (!nome) return;
                
                await supabaseClient.from('squadre').insert({ 
                    nome, punti: 0, partite_giocate: 0, vinte: 0, perse: 0 
                });
                
                document.getElementById('nomeSquadra').value = '';
                aggiornaListaSquadre();
                caricaSquadreSelect('squadraGiocatore');
                caricaSquadreSelect('squadraCasa');
                caricaSquadreSelect('squadraOspite');
                mostraMessaggio('✅ Squadra aggiunta!');
            });

            // Form Giocatore (con voto)
            document.getElementById('formGiocatore').addEventListener('submit', async (e) => {
                e.preventDefault();
                const nome = document.getElementById('nomeGiocatore').value.trim();
                const squadraId = document.getElementById('squadraGiocatore').value;
                const voto = parseInt(document.getElementById('votoGiocatore').value);
                
                if (!nome || !squadraId || isNaN(voto)) return;
                
                await supabaseClient.from('giocatori').insert({ 
                    nome, 
                    squadra_id: squadraId, 
                    voto: voto 
                });
                
                document.getElementById('nomeGiocatore').value = '';
                document.getElementById('votoGiocatore').value = '';
                aggiornaListaGiocatori();
                mostraMessaggio('✅ Giocatore aggiunto!');
            });

            // Form Partita (con voto)
            document.getElementById('formPartita').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const casaId = document.getElementById('squadraCasa').value;
                const ospiteId = document.getElementById('squadraOspite').value;
                const setCasa = parseInt(document.getElementById('setCasa').value);
                const setOspite = parseInt(document.getElementById('setOspite').value);
                const migliorId = document.getElementById('migliorGiocatore').value;
                const votoMigliore = parseInt(document.getElementById('votoMigliore').value);

                if (!casaId || !ospiteId || casaId === ospiteId || !migliorId || isNaN(votoMigliore)) {
                    mostraMessaggio('❌ Dati incompleti', 'error');
                    return;
                }

                // Calcolo punti
                let puntiCasa, puntiOspite;
                if (setCasa > setOspite) {
                    if (setCasa === 3 && (setOspite === 0 || setOspite === 1)) {
                        puntiCasa = 3; puntiOspite = 0;
                    } else if (setCasa === 3 && setOspite === 2) {
                        puntiCasa = 2; puntiOspite = 1;
                    } else {
                        mostraMessaggio('❌ Risultato non valido', 'error');
                        return;
                    }
                } else if (setOspite > setCasa) {
                    if (setOspite === 3 && (setCasa === 0 || setCasa === 1)) {
                        puntiCasa = 0; puntiOspite = 3;
                    } else if (setOspite === 3 && setCasa === 2) {
                        puntiCasa = 1; puntiOspite = 2;
                    } else {
                        mostraMessaggio('❌ Risultato non valido', 'error');
                        return;
                    }
                } else {
                    mostraMessaggio('❌ Pareggio non valido', 'error');
                    return;
                }

                try {
                    // Inserisci partita
                    const { data: partita } = await supabaseClient
                        .from('partite')
                        .insert({
                            squadra_casa_id: casaId,
                            squadra_ospite_id: ospiteId,
                            set_casa: setCasa,
                            set_ospite: setOspite,
                            data: new Date()
                        })
                        .select();

                    // Inserisci premio
                    await supabaseClient.from('premi').insert({
                        partita_id: partita[0].id,
                        giocatore_id: migliorId,
                        data: new Date()
                    });

                    // Aggiorna voto giocatore
                    await supabaseClient
                        .from('giocatori')
                        .update({ voto: votoMigliore })
                        .eq('id', migliorId);

                    // Aggiorna statistiche squadre
                    await aggiornaStatistiche(casaId, puntiCasa, setCasa > setOspite);
                    await aggiornaStatistiche(ospiteId, puntiOspite, setOspite > setCasa);

                    // Pulisci form
                    document.getElementById('setCasa').value = '';
