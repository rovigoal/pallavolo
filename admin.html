<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Rovigol Pallavolo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #1e293b;
        }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        nav a {
            color: #f97316;
            text-decoration: none;
            font-weight: 500;
            margin-top: 0.5rem;
            display: inline-block;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .card h2 {
            font-size: 1.5rem;
            color: #f97316;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #f97316;
            padding-bottom: 0.5rem;
        }

        .card h3 {
            font-size: 1.1rem;
            color: #334155;
            margin: 1.2rem 0 0.8rem;
        }

        form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        input, select, button {
            padding: 0.7rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: 0.15s;
        }

        input:focus, select:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
        }

        button {
            background: #f97316;
            color: white;
            border: none;
            font-weight: 500;
            cursor: pointer;
            padding: 0.7rem 1.5rem;
        }

        button:hover {
            background: #ea580c;
        }

        .btn-danger {
            background: #dc2626;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-small {
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }

        ul {
            list-style: none;
            margin-top: 1rem;
        }

        li {
            background: #f8fafc;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #f97316;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid #a7f3d0;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid #fecaca;
        }

        #password-protection {
            max-width: 400px;
            margin: 4rem auto;
            text-align: center;
        }

        #password-protection input {
            width: 100%;
            margin: 1rem 0;
        }

        #password-protection button {
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>🔧 Area Admin</h1>
        <nav><a href="main.html">← Torna alla Home</a></nav>
    </header>

    <main class="container">
        <!-- Login -->
        <div id="password-protection" class="card">
            <h2>Accesso Admin</h2>
            <input type="password" id="password-input" placeholder="Password">
            <button id="login-button" onclick="verificaPassword()">Accedi</button>
        </div>

        <div id="admin-content" style="display: none;">
            <div id="messageBox"></div>

            <!-- Gestione Squadre -->
            <section class="card">
                <h2>🏐 Gestione Squadre</h2>
                <form id="formSquadra" onsubmit="return false;">
                    <input type="text" id="nomeSquadra" placeholder="Nome squadra" required style="flex: 1;">
                    <button type="button" onclick="aggiungiSquadra()">Aggiungi Squadra</button>
                </form>
                <h3>Elenco Squadre</h3>
                <ul id="listaSquadre"></ul>
                <button class="btn-danger" onclick="eliminaTutteSquadre()">🗑️ Elimina TUTTE le squadre</button>
            </section>

            <!-- Gestione Giocatori -->
            <section class="card">
                <h2>👤 Gestione Giocatori</h2>
                <form id="formGiocatore" onsubmit="return false;">
                    <input type="text" id="nomeGiocatore" placeholder="Nome giocatore" required style="flex: 1;">
                    <select id="squadraGiocatore" required style="min-width: 150px;">
                        <option value="">Seleziona squadra</option>
                    </select>
                    <button type="button" onclick="aggiungiGiocatore()">Aggiungi</button>
                </form>
                <h3>Elenco Giocatori</h3>
                <ul id="listaGiocatori"></ul>
                <button class="btn-danger" onclick="eliminaTuttiGiocatori()">🗑️ Elimina TUTTI i giocatori</button>
            </section>

            <!-- Inserisci partita -->
            <section class="card">
                <h2>📊 Inserisci risultato partita</h2>
                <form id="formPartita" onsubmit="return false;">
                    <select id="squadraCasa" required style="min-width: 160px;">
                        <option value="">Squadra casa</option>
                    </select>
                    <input type="number" id="setCasa" min="0" max="3" placeholder="Set casa" required style="width: 100px;">
                    
                    <select id="squadraOspite" required style="min-width: 160px;">
                        <option value="">Squadra ospite</option>
                    </select>
                    <input type="number" id="setOspite" min="0" max="3" placeholder="Set ospite" required style="width: 100px;">
                    
                    <select id="migliorGiocatore" required style="min-width: 200px;">
                        <option value="">Miglior giocatore</option>
                    </select>
                    
                    <input type="number" id="punteggioMigliore" placeholder="Punteggio (0-99)" min="0" max="99" step="1" required style="width: 120px;">
                    
                    <button type="button" onclick="aggiungiPartita()">Registra</button>
                </form>
                <h3>Elenco Partite</h3>
                <ul id="listaPartite"></ul>
                <button class="btn-danger" onclick="eliminaTuttePartite()">🗑️ Elimina TUTTE le partite</button>
            </section>

            <!-- Pericolo -->
            <section class="card" style="background-color: #fff1f0; border-color: #dc2626;">
                <h2 style="color: #dc2626;">⚠️ Pericolo</h2>
                <p>Questa operazione cancellerà TUTTI i dati (squadre, giocatori, partite, premi).</p>
                <button class="btn-danger" onclick="eliminaTutto()">🔥 ELIMINA TUTTO 🔥</button>
            </section>
        </div>
    </main>

    <script>
        // ----------------------------------------------
        // Funzioni di utilità
        // ----------------------------------------------
        function mostraMessaggio(testo, tipo = 'success') {
            const box = document.getElementById('messageBox');
            if (!box) return;
            box.innerHTML = `<div class="alert-${tipo}">${testo}</div>`;
            setTimeout(() => { box.innerHTML = ''; }, 4000);
        }

        // ----------------------------------------------
        // Login
        // ----------------------------------------------
        function verificaPassword() {
            const psw = document.getElementById('password-input').value;
            if (psw === '123') {
                document.getElementById('password-protection').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                caricaDatiAdmin();
                mostraMessaggio('✅ Login effettuato');
            } else {
                alert('Password errata!');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const loginBtn = document.getElementById('login-button');
            if (loginBtn) {
                loginBtn.onclick = function(e) {
                    e.preventDefault();
                    verificaPassword();
                };
            }
        });

        // ----------------------------------------------
        // Variabili globali
        // ----------------------------------------------
        let squadre = [];
        let giocatori = [];

        async function caricaDatiAdmin() {
            await caricaSquadre();
            await caricaGiocatori();
            await aggiornaListe();
        }

        async function caricaSquadre() {
            const { data } = await supabaseClient.from('squadre').select('*');
            squadre = data || [];
        }

        async function caricaGiocatori() {
            const { data } = await supabaseClient.from('giocatori').select('id, nome, punteggio_totale, squadra_id');
            giocatori = data || [];
        }

        // ----------------------------------------------
        // Aggiornamento UI
        // ----------------------------------------------
        async function aggiornaListe() {
            await Promise.all([
                aggiornaListaSquadre(),
                aggiornaListaGiocatori(),
                aggiornaListaPartite()
            ]);
            aggiornaSelect();
        }

        function aggiornaSelect() {
            const selectSG = document.getElementById('squadraGiocatore');
            if (selectSG) {
                selectSG.innerHTML = '<option value="">Seleziona squadra</option>';
                squadre.forEach(s => {
                    selectSG.innerHTML += `<option value="${s.id}">${s.nome}</option>`;
                });
            }

            const selectSC = document.getElementById('squadraCasa');
            if (selectSC) {
                selectSC.innerHTML = '<option value="">Squadra casa</option>';
                squadre.forEach(s => {
                    selectSC.innerHTML += `<option value="${s.id}">${s.nome}</option>`;
                });
            }

            const selectSO = document.getElementById('squadraOspite');
            if (selectSO) {
                selectSO.innerHTML = '<option value="">Squadra ospite</option>';
                squadre.forEach(s => {
                    selectSO.innerHTML += `<option value="${s.id}">${s.nome}</option>`;
                });
            }
        }

        function aggiornaMigliorGiocatore() {
            const casaId = document.getElementById('squadraCasa').value;
            const ospiteId = document.getElementById('squadraOspite').value;
            if (!casaId || !ospiteId) return;

            const filtrati = giocatori.filter(g => g.squadra_id === casaId || g.squadra_id === ospiteId);
            const select = document.getElementById('migliorGiocatore');
            select.innerHTML = '<option value="">Miglior giocatore</option>';
            filtrati.forEach(g => {
                select.innerHTML += `<option value="${g.id}">${g.nome} (punti: ${g.punteggio_totale})</option>`;
            });
        }

        // ----------------------------------------------
        // Operazioni CRUD
        // ----------------------------------------------
        async function aggiungiSquadra() {
            const nome = document.getElementById('nomeSquadra').value.trim();
            if (!nome) {
                mostraMessaggio('❌ Inserisci un nome', 'error');
                return;
            }
            try {
                await supabaseClient.from('squadre').insert({ 
                    nome, punti: 0, partite_giocate: 0, vinte: 0, perse: 0 
                });
                document.getElementById('nomeSquadra').value = '';
                await caricaSquadre();
                await aggiornaListe();
                mostraMessaggio('✅ Squadra aggiunta!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        }

        async function aggiungiGiocatore() {
            const nome = document.getElementById('nomeGiocatore').value.trim();
            const squadraId = document.getElementById('squadraGiocatore').value;
            if (!nome || !squadraId) {
                mostraMessaggio('❌ Compila tutti i campi', 'error');
                return;
            }
            try {
                await supabaseClient.from('giocatori').insert({ 
                    nome, 
                    squadra_id: squadraId,
                    punteggio_totale: 0
                });
                document.getElementById('nomeGiocatore').value = '';
                await caricaGiocatori();
                await aggiornaListe();
                mostraMessaggio('✅ Giocatore aggiunto!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        }

        async function aggiungiPartita() {
            const casaId = document.getElementById('squadraCasa').value;
            const ospiteId = document.getElementById('squadraOspite').value;
            const setCasa = parseInt(document.getElementById('setCasa').value);
            const setOspite = parseInt(document.getElementById('setOspite').value);
            const migliorId = document.getElementById('migliorGiocatore').value;
            const punteggioMigliore = parseInt(document.getElementById('punteggioMigliore').value);

            if (!casaId || !ospiteId || casaId === ospiteId || !migliorId || isNaN(punteggioMigliore)) {
                mostraMessaggio('❌ Dati incompleti o errati', 'error');
                return;
            }

            // Calcolo punti
            let puntiCasa, puntiOspite;
            if (setCasa > setOspite) {
                if (setCasa === 3 && (setOspite === 0 || setOspite === 1)) {
                    puntiCasa = 3; puntiOspite = 0;
                } else if (setCasa === 3 && setOspite === 2) {
                    puntiCasa = 2; puntiOspite = 1;
                } else {
                    mostraMessaggio('❌ Risultato non valido (usa 3-0, 3-1, 3-2)', 'error');
                    return;
                }
            } else if (setOspite > setCasa) {
                if (setOspite === 3 && (setCasa === 0 || setCasa === 1)) {
                    puntiCasa = 0; puntiOspite = 3;
                } else if (setOspite === 3 && setCasa === 2) {
                    puntiCasa = 1; puntiOspite = 2;
                } else {
                    mostraMessaggio('❌ Risultato non valido (usa 0-3, 1-3, 2-3)', 'error');
                    return;
                }
            } else {
                mostraMessaggio('❌ Pareggio non valido', 'error');
                return;
            }

            try {
                // 1. Inserisci partita
                const { data: partita, error: errPartita } = await supabaseClient
                    .from('partite')
                    .insert({
                        squadra_casa_id: casaId,
                        squadra_ospite_id: ospiteId,
                        set_casa: setCasa,
                        set_ospite: setOspite,
                        data: new Date()
                    })
                    .select();
                if (errPartita) throw errPartita;

                // 2. Inserisci premio
                const { error: errPremio } = await supabaseClient
                    .from('premi')
                    .insert({
                        partita_id: partita[0].id,
                        giocatore_id: migliorId,
                        data: new Date()
                    });
                if (errPremio) throw errPremio;

                // 3. Aggiorna punteggio totale del giocatore (SOMMA)
                const { data: giocatore, error: errGiocatore } = await supabaseClient
                    .from('giocatori')
                    .select('punteggio_totale')
                    .eq('id', migliorId)
                    .single();
                if (errGiocatore) throw errGiocatore;

                const nuovoPunteggio = (giocatore.punteggio_totale || 0) + punteggioMigliore;

                const { error: errPunteggio } = await supabaseClient
                    .from('giocatori')
                    .update({ punteggio_totale: nuovoPunteggio })
                    .eq('id', migliorId);
                if (errPunteggio) throw errPunteggio;

                // 4. Aggiorna statistiche squadre
                await aggiornaStatistiche(casaId, puntiCasa, setCasa > setOspite);
                await aggiornaStatistiche(ospiteId, puntiOspite, setOspite > setCasa);

                // 5. Pulisci form
                document.getElementById('setCasa').value = '';
                document.getElementById('setOspite').value = '';
                document.getElementById('punteggioMigliore').value = '';
                document.getElementById('migliorGiocatore').innerHTML = '<option value="">Miglior giocatore</option>';

                // 6. Ricarica dati e aggiorna UI
                await caricaSquadre();
                await caricaGiocatori();
                await aggiornaListe();

                mostraMessaggio('✅ Partita registrata!');
            } catch (error) {
                console.error('Errore completo:', error);
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        }

        async function aggiornaStatistiche(squadraId, punti, vinta) {
            const { data: squadra, error } = await supabaseClient
                .from('squadre')
                .select('*')
                .eq('id', squadraId)
                .single();
            if (error) throw error;
            await supabaseClient.from('squadre').update({
                punti: squadra.punti + punti,
                partite_giocate: squadra.partite_giocate + 1,
                vinte: squadra.vinte + (vinta ? 1 : 0),
                perse: squadra.perse + (vinta ? 0 : 1)
            }).eq('id', squadraId);
        }

        // ----------------------------------------------
        // Funzioni di aggiornamento liste
        // ----------------------------------------------
        async function aggiornaListaSquadre() {
            const { data } = await supabaseClient.from('squadre').select('*');
            let html = '';
            (data || []).forEach(s => {
                html += `<li>
                    <span><strong>${s.nome}</strong> (Punti: ${s.punti})</span>
                    <button class="btn-danger btn-small" onclick="eliminaSquadra('${s.id}')">Elimina</button>
                </li>`;
            });
            document.getElementById('listaSquadre').innerHTML = html;
        }

        async function aggiornaListaGiocatori() {
            const { data } = await supabaseClient
                .from('giocatori')
                .select('id, nome, punteggio_totale, squadre!inner(nome)')
                .order('punteggio_totale', { ascending: false });
            let html = '';
            (data || []).forEach(g => {
                html += `<li>
                    <span><strong>${g.nome}</strong> - Punti: ${g.punteggio_totale} - ${g.squadre.nome}</span>
                    <button class="btn-danger btn-small" onclick="eliminaGiocatore('${g.id}')">Elimina</button>
                </li>`;
            });
            document.getElementById('listaGiocatori').innerHTML = html;
        }

        async function aggiornaListaPartite() {
            const { data } = await supabaseClient
                .from('partite')
                .select('id, set_casa, set_ospite, squadre!squadra_casa_id(nome), squadre!squadra_ospite_id(nome)')
                .order('data', { ascending: false });
            let html = '';
            (data || []).forEach(p => {
                html += `<li>
                    <span><strong>${p.squadre_casa_id.nome} vs ${p.squadre_ospite_id.nome}</strong> (${p.set_casa}-${p.set_ospite})</span>
                    <button class="btn-danger btn-small" onclick="eliminaPartita('${p.id}')">Elimina</button>
                </li>`;
            });
            document.getElementById('listaPartite').innerHTML = html;
        }

        // ----------------------------------------------
        // Eliminazioni
        // ----------------------------------------------
        window.eliminaSquadra = async (id) => {
            if (!confirm('Sicuro di voler eliminare questa squadra?')) return;
            try {
                await supabaseClient.from('squadre').delete().eq('id', id);
                await caricaSquadre();
                await caricaGiocatori();
                await aggiornaListe();
                mostraMessaggio('✅ Squadra eliminata!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        window.eliminaGiocatore = async (id) => {
            if (!confirm('Sicuro di voler eliminare questo giocatore?')) return;
            try {
                await supabaseClient.from('giocatori').delete().eq('id', id);
                await caricaGiocatori();
                await aggiornaListe();
                mostraMessaggio('✅ Giocatore eliminato!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        window.eliminaPartita = async (id) => {
            if (!confirm('Sicuro di voler eliminare questa partita?')) return;
            try {
                console.log('Eliminazione partita con id:', id);
                const { error } = await supabaseClient.from('partite').delete().eq('id', id);
                if (error) throw error;
                await aggiornaListe();
                mostraMessaggio('✅ Partita eliminata!');
            } catch (error) {
                console.error('Errore eliminazione partita:', error);
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        window.eliminaTutteSquadre = async () => {
            if (!confirm('ELIMINARE TUTTE LE SQUADRE? (Verranno eliminati anche giocatori e partite)')) return;
            try {
                await supabaseClient.from('premi').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('partite').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('giocatori').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('squadre').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await caricaSquadre();
                await caricaGiocatori();
                await aggiornaListe();
                mostraMessaggio('✅ Tutte le squadre eliminate!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        window.eliminaTuttiGiocatori = async () => {
            if (!confirm('ELIMINARE TUTTI I GIOCATORI?')) return;
            try {
                await supabaseClient.from('giocatori').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await caricaGiocatori();
                await aggiornaListe();
                mostraMessaggio('✅ Tutti i giocatori eliminati!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        window.eliminaTuttePartite = async () => {
            if (!confirm('ELIMINARE TUTTE LE PARTITE?')) return;
            try {
                await supabaseClient.from('premi').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('partite').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await aggiornaListe();
                mostraMessaggio('✅ Tutte le partite eliminate!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        window.eliminaTutto = async () => {
            if (!confirm('⚠️ STAI PER ELIMINARE TUTTI I DATI. SEI SICURO?')) return;
            try {
                await supabaseClient.from('premi').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('partite').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('giocatori').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabaseClient.from('squadre').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await caricaSquadre();
                await caricaGiocatori();
                await aggiornaListe();
                mostraMessaggio('✅ Tutto eliminato!');
            } catch (error) {
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        // ----------------------------------------------
        // Event listeners
        // ----------------------------------------------
        document.getElementById('squadraCasa')?.addEventListener('change', aggiornaMigliorGiocatore);
        document.getElementById('squadraOspite')?.addEventListener('change', aggiornaMigliorGiocatore);
    </script>
</body>
</html>
