<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Admin Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Admin - Test</h2>
    
    <div>
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div id="adminPanel" style="display:none;">
        <h3>Aggiungi Squadra</h3>
        <input type="text" id="nomeSquadra" placeholder="Nome squadra">
        <button onclick="aggiungiSquadra()">Aggiungi</button>
        <p id="messaggio"></p>
    </div>

    <script>
        // Configurazione Supabase (con le tue credenziali)
        const SUPABASE_URL = 'https://svvwbpnthazjxgcntfek.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2dndicG50aGF6anhnY250ZmVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NzMxNDMsImV4cCI6MjA4ODM0OTE0M30.HNf75JKb2SvfDdrvlKJfxeqtUXxJgBRUYnj5u_M2xfk';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function login() {
            const psw = document.getElementById('password').value;
            if (psw === '123') {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('messaggio').innerText = 'Login OK';
            } else {
                alert('Password errata');
            }
        }

        async function aggiungiSquadra() {
            const nome = document.getElementById('nomeSquadra').value;
            if (!nome) return;

            try {
                const { data, error } = await supabase
                    .from('squadre')
                    .insert({ nome, punti: 0, partite_giocate: 0, vinte: 0, perse: 0 });

                if (error) {
                    document.getElementById('messaggio').innerText = 'Errore: ' + error.message;
                } else {
                    document.getElementById('messaggio').innerText = 'Squadra aggiunta!';
                    document.getElementById('nomeSquadra').value = '';
                }
            } catch (e) {
                document.getElementById('messaggio').innerText = 'Errore: ' + e.toString();
            }
        }
    </script>
</body>
</html>
