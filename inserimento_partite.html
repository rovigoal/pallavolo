<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Inserimento Partite</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', sans-serif; min-height:100vh; background:linear-gradient(145deg,#0b2b40 0%,#1e4b5e 100%); padding:20px; position:relative; }
        .volley-bg { position:fixed; width:100%; height:100%; top:0; left:0; z-index:0; }
        .ball { position:absolute; width:80px; height:80px; background:#f9c74f; border-radius:50%; opacity:0.2; animation:float 15s infinite ease-in-out; }
        .ball::after { content:""; position:absolute; top:50%; left:50%; width:100%; height:100%; background:radial-gradient(circle at 30% 30%, white, #f1b24a 70%); border-radius:50%; transform:translate(-50%,-50%); }
        .ball::before { content:""; position:absolute; top:0; left:50%; width:4px; height:100%; background:#333; transform:translateX(-50%) rotate(30deg); border-radius:2px; }
        .ball:nth-child(1) { top:10%; left:5%; width:120px; height:120px; animation-delay:0s; }
        .ball:nth-child(2) { bottom:15%; right:8%; width:180px; height:180px; animation-delay:2s; }
        .ball:nth-child(3) { top:40%; right:20%; width:90px; height:90px; animation-delay:4s; }
        .ball:nth-child(4) { bottom:30%; left:15%; width:150px; height:150px; animation-delay:1s; }
        .ball:nth-child(5) { top:70%; left:40%; width:100px; height:100px; animation-delay:3s; }
        @keyframes float { 0% { transform:translateY(0px) rotate(0deg); } 50% { transform:translateY(-30px) rotate(180deg); } 100% { transform:translateY(0px) rotate(360deg); } }
        .container { position:relative; z-index:10; backdrop-filter:blur(8px); background:rgba(255,255,255,0.1); border-radius:40px; padding:40px 50px; border:1px solid rgba(255,255,255,0.2); box-shadow:0 20px 40px rgba(0,0,0,0.3); color:white; max-width:1200px; margin:0 auto; }
        h1 { text-align:center; font-size:2.5rem; margin-bottom:40px; background:linear-gradient(135deg,#fff,#ffe5b4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .form-card { background:rgba(0,0,0,0.3); border-radius:30px; padding:30px; margin-bottom:40px; border:1px solid rgba(255,255,255,0.15); }
        .form-row { display:flex; flex-wrap:wrap; gap:20px; margin-bottom:20px; align-items:flex-end; }
        .form-group { flex:1 1 200px; }
        label { display:block; margin-bottom:8px; font-weight:600; color:#eee; }
        input, select { width:100%; padding:12px 20px; border:none; border-radius:50px; background:rgba(255,255,255,0.2); color:white; font-size:1rem; outline:2px solid transparent; transition:0.3s; }
        select option { background:#0b2b40; color:white; }
        input:focus, select:focus { outline:2px solid #f9c74f; background:rgba(255,255,255,0.25); }
        .btn { background:#f9c74f; border:none; padding:12px 30px; font-size:1.2rem; font-weight:bold; color:#0b2b40; border-radius:60px; cursor:pointer; box-shadow:0 5px 0 #b87c2c; transition:0.2s; text-transform:uppercase; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 7px 0 #b87c2c; background:#ffe08c; }
        .btn-small { padding:6px 15px; font-size:0.9rem; box-shadow:0 3px 0 #b87c2c; }
        .btn-danger { background:#e63946; box-shadow:0 5px 0 #a12733; color:white; }
        .btn-danger:hover { background:#ff5a6e; box-shadow:0 7px 0 #a12733; }
        .table-wrapper { overflow-x:auto; background:rgba(0,0,0,0.2); border-radius:30px; padding:20px; }
        table { width:100%; border-collapse:collapse; color:white; }
        th { background:rgba(249,199,79,0.3); padding:12px; font-weight:600; text-transform:uppercase; }
        td { padding:12px; border-bottom:1px solid rgba(255,255,255,0.1); text-align:center; }
        .message { margin-top:20px; padding:10px; border-radius:30px; text-align:center; font-weight:bold; background:rgba(0,0,0,0.3); }
        .back-link { display:block; text-align:center; margin-top:30px; color:rgba(255,255,255,0.7); text-decoration:none; }
        .back-link:hover { color:white; text-decoration:underline; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="volley-bg">
        <div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div>
    </div>
    <div class="container">
        <h1>⚡ INSERIMENTO PARTITE ⚡</h1>
        <div class="form-card">
            <h2 style="color:#f9c74f; margin-bottom:20px;">Nuova Partita</h2>
            <form id="formPartita">
                <div class="form-row">
                    <div class="form-group">
                        <label for="squadra_casa">Squadra Casa</label>
                        <select id="squadra_casa" required>
                            <option value="">Seleziona</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="squadra_ospite">Squadra Ospite</label>
                        <select id="squadra_ospite" required>
                            <option value="">Seleziona</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Risultato</label>
                        <select id="risultato" required>
                            <option value="">Seleziona risultato</option>
                            <option value="3-0">3 - 0</option>
                            <option value="3-1">3 - 1</option>
                            <option value="3-2">3 - 2</option>
                            <option value="2-3">2 - 3</option>
                            <option value="1-3">1 - 3</option>
                            <option value="0-3">0 - 3</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="data">Data</label>
                        <input type="date" id="data" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="miglior_giocatore">Miglior Giocatore</label>
                        <select id="miglior_giocatore" required>
                            <option value="">Seleziona</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="punti_giocatore">Punti (0-99)</label>
                        <input type="number" id="punti_giocatore" min="0" max="99" required>
                    </div>
                </div>
                <button type="submit" class="btn">Salva Partita</button>
                <div id="msgSalva" class="message" style="display:none;"></div>
            </form>
        </div>

        <h2 style="color:#f9c74f; margin-bottom:20px;">Partite Inserite</h2>
        <div class="table-wrapper">
            <table id="tabellaPartite">
                <thead>
                    <tr><th>Casa</th><th>Ospite</th><th>Risultato</th><th>Data</th><th>Miglior Giocatore</th><th>Punti MG</th><th>Azione</th></tr>
                </thead>
                <tbody id="listaPartite"></tbody>
            </table>
        </div>
        <a href="admin_panel.html" class="back-link">← Torna al pannello admin</a>
    </div>
    <script>
        const SUPABASE_URL = 'https://ojzdxhukqhnrobpxxvlh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qemR4aHVrcWhucm9icHh4dmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzc5NDIsImV4cCI6MjA4ODM1Mzk0Mn0.N47R33pZ54dyoLyLqZfjfBkXyRYgWal0y-NwJKjM0XI';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function showMessage(elId, text, isSuccess) {
            const msg = document.getElementById(elId);
            msg.style.display = 'block';
            msg.textContent = text;
            msg.style.backgroundColor = isSuccess ? 'rgba(76,175,80,0.3)' : 'rgba(244,67,54,0.3)';
            setTimeout(() => msg.style.display = 'none', 4000);
        }

        // Carica squadre per i select
        async function loadSquadre() {
            const { data, error } = await supabaseClient.from('squadre').select('id, nome').order('nome');
            if (error) return console.error(error);
            const casa = document.getElementById('squadra_casa');
            const ospite = document.getElementById('squadra_ospite');
            casa.innerHTML = '<option value="">Seleziona</option>';
            ospite.innerHTML = '<option value="">Seleziona</option>';
            data.forEach(s => {
                casa.appendChild(new Option(s.nome, s.id));
                ospite.appendChild(new Option(s.nome, s.id));
            });
        }

        // Carica giocatori per il select miglior giocatore
        async function loadGiocatori() {
            const { data, error } = await supabaseClient
                .from('giocatori')
                .select('id, nome, cognome, squadra_id')
                .order('cognome');
            if (error) return console.error(error);
            const select = document.getElementById('miglior_giocatore');
            select.innerHTML = '<option value="">Seleziona</option>';
            // Per ogni giocatore, dobbiamo ottenere il nome della squadra (facciamo una seconda chiamata? meglio una join)
            // Invece facciamo una query separata per le squadre e costruiamo una mappa
            const { data: squadre, error: errS } = await supabaseClient.from('squadre').select('id, nome');
            if (errS) return console.error(errS);
            const squadreMap = {};
            squadre.forEach(s => squadreMap[s.id] = s.nome);

            data.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.id;
                opt.textContent = `${g.cognome} ${g.nome} (${squadreMap[g.squadra_id] || '?'})`;
                select.appendChild(opt);
            });
        }

        // Carica partite e arricchisce con i nomi delle squadre e del giocatore
        async function loadPartite() {
            // Ottieni tutte le partite
            const { data: partite, error } = await supabaseClient
                .from('partite')
                .select('*')
                .order('data', { ascending: false });
            if (error) return console.error(error);

            // Ottieni tutte le squadre e giocatori per arricchire
            const { data: squadre, error: errS } = await supabaseClient.from('squadre').select('id, nome');
            if (errS) return console.error(errS);
            const squadreMap = {};
            squadre.forEach(s => squadreMap[s.id] = s.nome);

            const { data: giocatori, error: errG } = await supabaseClient.from('giocatori').select('id, nome, cognome');
            if (errG) return console.error(errG);
            const giocatoriMap = {};
            giocatori.forEach(g => giocatoriMap[g.id] = `${g.nome} ${g.cognome}`);

            const tbody = document.getElementById('listaPartite');
            tbody.innerHTML = '';
            partite.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${squadreMap[p.squadra_casa_id] || '?'}</td>
                    <td>${squadreMap[p.squadra_ospite_id] || '?'}</td>
                    <td>${p.set_casa} - ${p.set_ospite}</td>
                    <td>${p.data}</td>
                    <td>${giocatoriMap[p.miglior_giocatore_id] || '-'}</td>
                    <td>${p.punti_miglior_giocatore ?? '-'}</td>
                    <td><button class="btn-small btn-danger" onclick="cancellaPartita(${p.id})">Cancella</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.cancellaPartita = async function(id) {
            if (!confirm('Cancellare la partita? I punti verranno rimossi dalle classifiche.')) return;
            const { error } = await supabaseClient.from('partite').delete().eq('id', id);
            if (error) alert('Errore: ' + error.message);
            else {
                showMessage('msgSalva', 'Partita cancellata', true);
                loadPartite();
            }
        };

        document.getElementById('formPartita').addEventListener('submit', async (e) => {
            e.preventDefault();
            const casa = document.getElementById('squadra_casa').value;
            const ospite = document.getElementById('squadra_ospite').value;
            const risultato = document.getElementById('risultato').value;
            const data = document.getElementById('data').value;
            const mg = document.getElementById('miglior_giocatore').value;
            const punti = parseInt(document.getElementById('punti_giocatore').value);
            if (!casa || !ospite || !risultato || !data || !mg || isNaN(punti)) 
                return showMessage('msgSalva', 'Compila tutti i campi', false);
            if (casa === ospite) return showMessage('msgSalva', 'Squadre diverse', false);
            const [set_casa, set_ospite] = risultato.split('-').map(Number);
            const { error } = await supabaseClient.from('partite').insert([{
                squadra_casa_id: casa,
                squadra_ospite_id: ospite,
                set_casa, set_ospite, data,
                miglior_giocatore_id: mg,
                punti_miglior_giocatore: punti
            }]);
            if (error) showMessage('msgSalva', 'Errore: ' + error.message, false);
            else {
                showMessage('msgSalva', 'Partita inserita!', true);
                document.getElementById('formPartita').reset();
                loadPartite();
            }
        });

        window.onload = () => {
            loadSquadre();
            loadGiocatori();
            loadPartite();
        };
    </script>
</body>
</html>
