<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ROVIGOL/PALLAVOLO - Inserimento Squadre e Giocatori</title>
    <style>
        /* stili invariati (come da versione precedente) */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', sans-serif; min-height:100vh; background:linear-gradient(145deg,#0b2b40 0%,#1e4b5e 100%); display:flex; justify-content:center; align-items:center; padding:20px; position:relative; }
        .volley-bg { position:fixed; width:100%; height:100%; top:0; left:0; z-index:0; }
        .ball { position:absolute; width:80px; height:80px; background:#f9c74f; border-radius:50%; opacity:0.2; animation:float 15s infinite ease-in-out; }
        .ball::after { content:""; position:absolute; top:50%; left:50%; width:100%; height:100%; background:radial-gradient(circle at 30% 30%, white, #f1b24a 70%); border-radius:50%; transform:translate(-50%,-50%); }
        .ball::before { content:""; position:absolute; top:0; left:50%; width:4px; height:100%; background:#333; transform:translateX(-50%) rotate(30deg); border-radius:2px; }
        .ball:nth-child(1) { top:10%; left:5%; width:120px; height:120px; animation-delay:0s; }
        .ball:nth-child(2) { bottom:15%; right:8%; width:180px; height:180px; animation-delay:2s; }
        .ball:nth-child(3) { top:40%; right:20%; width:90px; height:90px; animation-delay:4s; }
        .ball:nth-child(4) { bottom:30%; left:15%; width:150px; height:150px; animation-delay:1s; }
        .ball:nth-child(5) { top:70%; left:40%; width:100px; height:100px; animation-delay:3s; }
        @keyframes float { 0% { transform:translateY(0px) rotate(0deg); } 50% { transform:translateY(-30px) rotate(180deg); } 100% { transform:translateY(0px) rotate(360deg); } }
        .container { position:relative; z-index:10; backdrop-filter:blur(8px); background:rgba(255,255,255,0.1); border-radius:40px; padding:40px 50px; border:1px solid rgba(255,255,255,0.2); box-shadow:0 20px 40px rgba(0,0,0,0.3); color:white; width:100%; max-width:900px; }
        h1 { text-align:center; font-size:2.5rem; margin-bottom:40px; background:linear-gradient(135deg,#fff,#ffe5b4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .form-grid { display:flex; flex-wrap:wrap; gap:30px; justify-content:center; }
        .card { flex:1 1 300px; background:rgba(0,0,0,0.3); border-radius:30px; padding:30px; backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,0.15); }
        .card h2 { margin-bottom:20px; color:#f9c74f; text-transform:uppercase; font-size:1.8rem; }
        .form-group { margin-bottom:20px; }
        label { display:block; margin-bottom:8px; font-weight:600; color:#eee; }
        input, select { width:100%; padding:12px 20px; border:none; border-radius:50px; background:rgba(255,255,255,0.2); color:white; font-size:1rem; outline:2px solid transparent; transition:0.3s; }
        input::placeholder { color:rgba(255,255,255,0.6); }
        input:focus, select:focus { outline:2px solid #f9c74f; background:rgba(255,255,255,0.25); }
        select option { background:#0b2b40; color:white; }
        .btn { background:#f9c74f; border:none; padding:14px 30px; font-size:1.3rem; font-weight:bold; color:#0b2b40; border-radius:60px; cursor:pointer; box-shadow:0 5px 0 #b87c2c; transition:0.2s; width:100%; text-transform:uppercase; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 7px 0 #b87c2c; background:#ffe08c; }
        .btn:active { transform:translateY(3px); box-shadow:0 2px 0 #b87c2c; }
        .message { margin-top:20px; padding:10px; border-radius:30px; text-align:center; font-weight:bold; background:rgba(0,0,0,0.3); }
        .back-link { display:block; text-align:center; margin-top:30px; color:rgba(255,255,255,0.7); text-decoration:none; }
        .back-link:hover { color:white; text-decoration:underline; }
        @media screen and (max-width:768px) {
            body { padding:10px; overflow:auto; }
            .container { padding:20px 15px !important; width:100% !important; max-width:100% !important; margin:10px auto !important; }
            h1 { font-size:2rem !important; margin-bottom:20px; }
            .form-grid { flex-direction:column; gap:20px; }
            .card { width:100%; padding:20px; }
            .card h2 { font-size:1.5rem; }
            .btn { padding:12px 20px !important; font-size:1.1rem !important; }
            input, select { font-size:16px !important; }
            .ball { opacity:0.1; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="volley-bg">
        <div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div>
    </div>
    <div class="container">
        <h1>⚡ ROVIGOL/PALLAVOLO - INSERIMENTO SQUADRE & GIOCATORI ⚡</h1>
        <div class="form-grid">
            <div class="card">
                <h2>🏐 Nuova Squadra</h2>
                <form id="formSquadra">
                    <div class="form-group">
                        <label for="nomeSquadra">Nome Squadra</label>
                        <input type="text" id="nomeSquadra" placeholder="es. Volley Lions" required>
                    </div>
                    <button type="submit" class="btn">Aggiungi Squadra</button>
                </form>
                <div id="msgSquadra" class="message" style="display: none;"></div>
            </div>
            <div class="card">
                <h2>🌟 Nuovo Giocatore</h2>
                <form id="formGiocatore">
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" placeholder="Mario" required>
                    </div>
                    <div class="form-group">
                        <label for="cognome">Cognome</label>
                        <input type="text" id="cognome" placeholder="Rossi" required>
                    </div>
                    <div class="form-group">
                        <label for="squadra">Squadra</label>
                        <select id="squadra" required>
                            <option value="">Seleziona squadra</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Aggiungi Giocatore</button>
                </form>
                <div id="msgGiocatore" class="message" style="display: none;"></div>
            </div>
        </div>
        <a href="admin_panel.html" class="back-link">← Torna al pannello admin</a>
    </div>
    <script>
        const SUPABASE_URL = 'https://ojzdxhukqhnrobpxxvlh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qemR4aHVrcWhucm9icHh4dmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzc5NDIsImV4cCI6MjA4ODM1Mzk0Mn0.N47R33pZ54dyoLyLqZfjfBkXyRYgWal0y-NwJKjM0XI';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function showMessage(elId, text, isSuccess) {
            const msg = document.getElementById(elId);
            msg.style.display = 'block';
            msg.textContent = text;
            msg.style.backgroundColor = isSuccess ? 'rgba(76,175,80,0.3)' : 'rgba(244,67,54,0.3)';
            setTimeout(() => msg.style.display = 'none', 4000);
        }

        async function loadSquadre() {
            const { data, error } = await supabaseClient.from('squadre').select('id, nome').order('nome');
            if (error) return console.error(error);
            const select = document.getElementById('squadra');
            select.innerHTML = '<option value="">Seleziona squadra</option>';
            data.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.nome;
                select.appendChild(opt);
            });
        }
        loadSquadre();

        document.getElementById('formSquadra').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nomeSquadra').value.trim();
            if (!nome) return showMessage('msgSquadra', 'Inserisci un nome', false);
            const { error } = await supabaseClient.from('squadre').insert([{ nome }]);
            if (error) {
                if (error.code === '23505') showMessage('msgSquadra', 'Squadra già esistente', false);
                else showMessage('msgSquadra', 'Errore: ' + error.message, false);
            } else {
                showMessage('msgSquadra', 'Squadra aggiunta con successo!', true);
                document.getElementById('nomeSquadra').value = '';
                loadSquadre();
            }
        });

        document.getElementById('formGiocatore').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value.trim();
            const cognome = document.getElementById('cognome').value.trim();
            const squadra_id = document.getElementById('squadra').value;
            if (!nome || !cognome || !squadra_id) return showMessage('msgGiocatore', 'Compila tutti i campi', false);
            const { error } = await supabaseClient.from('giocatori').insert([{ nome, cognome, squadra_id }]);
            if (error) showMessage('msgGiocatore', 'Errore: ' + error.message, false);
            else {
                showMessage('msgGiocatore', 'Giocatore aggiunto!', true);
                document.getElementById('nome').value = '';
                document.getElementById('cognome').value = '';
                document.getElementById('squadra').value = '';
            }
        });
    </script>
</body>
</html>
