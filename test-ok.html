<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Test Supabase OK</h2>
    
    <button onclick="testSupabase()">Test Supabase</button>
    
    <div id="output" style="margin-top:20px; padding:15px; background:#e0e0e0; border-radius:5px;">
        In attesa del test...
    </div>

    <script>
        const SUPABASE_URL = 'https://ojzdxhukqhnrobpxxvlh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qemR4aHVrcWhucm9icHh4dmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzc5NDIsImV4cCI6MjA4ODM1Mzk0Mn0.N47R33pZ54dyoLyLqZfjfBkXyRYgWal0y-NwJKjM0XI';
        
        function scrivi(msg) {
            document.getElementById('output').innerHTML += '<br>' + msg;
        }

        function testSupabase() {
            document.getElementById('output').innerHTML = '🚀 Avvio test...';
            
            try {
                // Inizializza
                scrivi('📌 Creazione client...');
                const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                scrivi('✅ Client creato');
                
                // Prova a leggere
                scrivi('📌 Lettura dati...');
                
                supabase
                    .from('squadre')
                    .select('*')
                    .then(result => {
                        scrivi('✅ Dati ricevuti: ' + JSON.stringify(result.data));
                        if (result.error) {
                            scrivi('❌ Errore: ' + result.error.message);
                        } else {
                            scrivi('🎉 SUCCESSO! Supabase funziona!');
                        }
                    })
                    .catch(err => {
                        scrivi('❌ Errore promise: ' + err.toString());
                    });
                    
            } catch(e) {
                scrivi('❌ Errore inizializzazione: ' + e.toString());
            }
        }
    </script>
</body>
</html>
