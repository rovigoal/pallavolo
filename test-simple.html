<!DOCTYPE html>
<html>
<head>
    <title>Test Supabase</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, button { padding: 10px; margin: 5px; width: 90%; }
        .box { border: 1px solid #ccc; padding: 15px; margin: 10px 0; }
        .success { background: #d4edda; color: #155724; padding: 10px; }
        .error { background: #f8d7da; color: #721c24; padding: 10px; }
    </style>
</head>
<body>
    <h2>Test Connessione Supabase</h2>
    
    <div class="box">
        <h3>1. Login Admin</h3>
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Accedi</button>
        <div id="loginMessage"></div>
    </div>

    <div id="adminPanel" style="display:none;">
        <div class="box">
            <h3>2. Test Inserimento Squadra</h3>
            <input type="text" id="nomeSquadra" placeholder="Nome squadra test">
            <button onclick="testInserimento()">Prova Inserimento</button>
            <div id="testMessage"></div>
        </div>

        <div class="box">
            <h3>3. Risultati</h3>
            <div id="results"></div>
        </div>
    </div>

    <script>
        // Le tue credenziali
        const SUPABASE_URL = 'https://svvwbpnthazjxgcntfek.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2dndicG50aGF6anhnY250ZmVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NzMxNDMsImV4cCI6MjA4ODM0OTE0M30.HNf75JKb2SvfDdrvlKJfxeqtUXxJgBRUYnj5u_M2xfk';
        
        let supabase;

        function login() {
            const psw = document.getElementById('password').value;
            if (psw === '123') {
                document.getElementById('loginMessage').innerHTML = '<div class="success">✅ Password corretta</div>';
                document.getElementById('adminPanel').style.display = 'block';
                
                // Inizializza Supabase DOPO il login
                try {
                    supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    document.getElementById('results').innerHTML += '<div class="success">✅ Supabase inizializzato</div>';
                } catch(e) {
                    document.getElementById('results').innerHTML += '<div class="error">❌ Errore inizializzazione: ' + e.message + '</div>';
                }
            } else {
                document.getElementById('loginMessage').innerHTML = '<div class="error">❌ Password errata</div>';
            }
        }

        async function testInserimento() {
            const nome = document.getElementById('nomeSquadra').value;
            if (!nome) {
                document.getElementById('testMessage').innerHTML = '<div class="error">❌ Inserisci un nome</div>';
                return;
            }

            try {
                document.getElementById('testMessage').innerHTML = '<div>⏳ Invio in corso...</div>';
                
                const { data, error } = await supabase
                    .from('squadre')
                    .insert({ 
                        nome: nome, 
                        punti: 0, 
                        partite_giocate: 0, 
                        vinte: 0, 
                        perse: 0 
                    });

                if (error) {
                    document.getElementById('testMessage').innerHTML = '<div class="error">❌ Errore: ' + error.message + '</div>';
                } else {
                    document.getElementById('testMessage').innerHTML = '<div class="success">✅ Squadra aggiunta!</div>';
                    document.getElementById('nomeSquadra').value = '';
                    
                    // Verifica leggendo i dati
                    const { data: squadre, error: readError } = await supabase
                        .from('squadre')
                        .select('*');
                        
                    if (readError) {
                        document.getElementById('results').innerHTML += '<div class="error">❌ Errore lettura: ' + readError.message + '</div>';
                    } else {
                        document.getElementById('results').innerHTML += '<div class="success">📊 Squadre nel DB: ' + squadre.length + '</div>';
                        if (squadre.length > 0) {
                            let lista = '<ul>';
                            squadre.forEach(s => lista += '<li>' + s.nome + '</li>');
                            lista += '</ul>';
                            document.getElementById('results').innerHTML += lista;
                        }
                    }
                }
            } catch (e) {
                document.getElementById('testMessage').innerHTML = '<div class="error">❌ Eccezione: ' + e.toString() + '</div>';
            }
        }
    </script>
</body>
</html>
