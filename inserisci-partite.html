<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserisci / Modifica Partite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%);
            min-height: 100vh;
            color: #1e293b;
        }
        header {
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.3);
        }
        header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.5px; }
        nav { margin-top: 0.8rem; }
        nav a {
            color: white;
            margin-right: 2rem;
            text-decoration: none;
            font-weight: 500;
            padding: 0.4rem 0;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        nav a:hover { border-bottom-color: white; }
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.1), 0 0 0 1px rgba(249,115,22,0.1) inset;
        }
        .card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f97316;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #f97316;
            padding-bottom: 0.75rem;
        }
        form { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
        input, select, button {
            padding: 0.7rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
        }
        input:focus, select:focus { border-color: #f97316; }
        button {
            background: #f97316;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        button:hover { background: #ea580c; }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-small {
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }
        .partita-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #f97316;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .partita-info { flex: 1; }
        .partita-azioni { display: flex; gap: 0.5rem; }
        .badge {
            background: #f97316;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }
        .mvp-label { font-size: 0.9rem; color: #475569; margin-top: 0.3rem; }
        #messageBox { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>⚡ Rovigol Pallavolo – Gestione Partite</h1>
        <nav>
            <a href="main.html">← Home</a>
            <a href="admin.html">Admin</a>
            <a href="partite.html">📋 Tutte le partite</a>
        </nav>
    </header>

    <div class="container">
        <div id="messageBox"></div>

        <!-- FORM DI INSERIMENTO / MODIFICA -->
        <div class="card">
            <h2 id="formTitolo">➕ Nuova partita</h2>
            <form id="matchForm" onsubmit="return false;">
                <input type="hidden" id="matchId" value="">

                <select id="squadraCasa" required style="flex:1;">
                    <option value="">Squadra casa</option>
                </select>

                <select id="squadraOspite" required style="flex:1;">
                    <option value="">Squadra ospite</option>
                </select>

                <input type="number" id="setCasa" placeholder="Set casa" min="0" step="1" required style="width:100px;">
                <input type="number" id="setOspite" placeholder="Set ospite" min="0" step="1" required style="width:100px;">

                <input type="datetime-local" id="dataPartita" required style="flex:1;">

                <select id="mvpPartita" style="flex:1;">
                    <option value="">MVP (opzionale)</option>
                </select>

                <button type="button" onclick="salvaPartita()" id="salvaBtn">💾 Salva partita</button>
                <button type="button" class="btn-danger" onclick="resetForm()" id="annullaBtn" style="display:none;">✖ Annulla modifica</button>
            </form>
        </div>

        <!-- ELENCO PARTITE CON MODIFICA / ELIMINA -->
        <div class="card">
            <h2>📋 Partite inserite</h2>
            <div id="listaPartiteAdmin"></div>
        </div>
    </div>

    <script>
        // -------------------- UTILS --------------------
        function mostraMessaggio(testo, tipo = 'success') {
            const box = document.getElementById('messageBox');
            box.innerHTML = `<div class="alert-${tipo}">${testo}</div>`;
            setTimeout(() => box.innerHTML = '', 4000);
        }

        // -------------------- CARICAMENTO DATI INIZIALI --------------------
        let squadre = [];
        let giocatori = [];

        async function caricaSquadre() {
            const { data } = await supabaseClient.from('squadre').select('*').order('nome');
            squadre = data || [];
        }

        async function caricaGiocatori() {
            const { data } = await supabaseClient.from('giocatori').select('id, nome, squadra_id');
            giocatori = data || [];
        }

        async function aggiornaSelectSquadre() {
            const selectCasa = document.getElementById('squadraCasa');
            const selectOspite = document.getElementById('squadraOspite');
            const options = '<option value="">Squadra casa</option>' + 
                squadre.map(s => `<option value="${s.id}">${s.nome}</option>`).join('');
            selectCasa.innerHTML = options;
            selectOspite.innerHTML = '<option value="">Squadra ospite</option>' + 
                squadre.map(s => `<option value="${s.id}">${s.nome}</option>`).join('');
        }

        function aggiornaSelectMVP() {
            const select = document.getElementById('mvpPartita');
            select.innerHTML = '<option value="">MVP (opzionale)</option>' + 
                giocatori.map(g => `<option value="${g.id}">${g.nome}</option>`).join('');
        }

        // -------------------- GESTIONE STATISTICHE (APPLICA / RIMUOVI) --------------------
        async function applicaStatistiche(partita, segno = 1) {
            // segno: +1 per aggiungere, -1 per rimuovere
            // aggiorna squadre (punti, vinte, perse)
            const { squadra_casa_id, squadra_ospite_id, set_casa, set_ospite } = partita;
            const casaVince = set_casa > set_ospite;
            const squadraVincenteId = casaVince ? squadra_casa_id : squadra_ospite_id;
            const squadraPerdenteId = casaVince ? squadra_ospite_id : squadra_casa_id;

            // punti standard: 3 per la vittoria, 0 per la sconfitta
            const puntiVittoria = 3;

            // aggiorna squadra vincente
            await supabaseClient.rpc('aggiorna_squadra', { 
                squadra_id: squadraVincenteId, 
                delta_punti: segno * puntiVittoria,
                delta_vinte: segno * 1,
                delta_perse: 0,
                delta_partite: segno * 1
            }).catch(() => {
                // fallback manuale se la RPC non esiste
                return supabaseClient
                    .from('squadre')
                    .update({ 
                        punti: supabaseClient.rpc('increment', { inc: segno * puntiVittoria }),
                        vinte: supabaseClient.rpc('increment', { inc: segno * 1 }),
                        partite_giocate: supabaseClient.rpc('increment', { inc: segno * 1 })
                    })
                    .eq('id', squadraVincenteId);
            });

            // aggiorna squadra perdente
            await supabaseClient.rpc('aggiorna_squadra', { 
                squadra_id: squadraPerdenteId, 
                delta_punti: 0,
                delta_vinte: 0,
                delta_perse: segno * 1,
                delta_partite: segno * 1
            }).catch(() => {
                return supabaseClient
                    .from('squadre')
                    .update({ 
                        perse: supabaseClient.rpc('increment', { inc: segno * 1 }),
                        partite_giocate: supabaseClient.rpc('increment', { inc: segno * 1 })
                    })
                    .eq('id', squadraPerdenteId);
            });

            // aggiorna MVP se presente
            if (partita.mvp_id) {
                await supabaseClient.rpc('aggiorna_giocatore', {
                    giocatore_id: partita.mvp_id,
                    delta_punti: segno * 1   // ogni MVP vale 1 punto
                }).catch(() => {
                    return supabaseClient
                        .from('giocatori')
                        .update({ punteggio_totale: supabaseClient.rpc('increment', { inc: segno * 1 }) })
                        .eq('id', partita.mvp_id);
                });
            }
        }

        // -------------------- SALVA (INSERISCE O MODIFICA) --------------------
        window.salvaPartita = async function() {
            const matchId = document.getElementById('matchId').value;
            const squadraCasa = document.getElementById('squadraCasa').value;
            const squadraOspite = document.getElementById('squadraOspite').value;
            const setCasa = parseInt(document.getElementById('setCasa').value);
            const setOspite = parseInt(document.getElementById('setOspite').value);
            const data = document.getElementById('dataPartita').value;
            const mvpId = document.getElementById('mvpPartita').value || null;

            if (!squadraCasa || !squadraOspite || isNaN(setCasa) || isNaN(setOspite) || !data) {
                return mostraMessaggio('❌ Compila tutti i campi obbligatori', 'error');
            }
            if (squadraCasa === squadraOspite) {
                return mostraMessaggio('❌ Le squadre devono essere diverse', 'error');
            }

            const partitaData = {
                squadra_casa_id: squadraCasa,
                squadra_ospite_id: squadraOspite,
                set_casa: setCasa,
                set_ospite: setOspite,
                data: new Date(data).toISOString()
            };

            try {
                if (matchId) {
                    // MODIFICA: recupera vecchi dati, rimuovi vecchie stats, aggiorna, aggiungi nuove stats
                    const { data: vecchiaPartita, error: errVecchia } = await supabaseClient
                        .from('partite')
                        .select('*, premi!inner(giocatore_id)')
                        .eq('id', matchId)
                        .maybeSingle();

                    if (errVecchia) throw errVecchia;

                    // Costruisci oggetto vecchia partita con MVP
                    const vecchia = {
                        ...vecchiaPartita,
                        mvp_id: vecchiaPartita?.premi?.[0]?.giocatore_id || null
                    };

                    // Rimuovi vecchie statistiche
                    if (vecchia) await applicaStatistiche(vecchia, -1);

                    // Elimina vecchio MVP dalla tabella premi
                    await supabaseClient.from('premi').delete().eq('partita_id', matchId);

                    // Aggiorna la partita
                    const { error: updateErr } = await supabaseClient
                        .from('partite')
                        .update(partitaData)
                        .eq('id', matchId);
                    if (updateErr) throw updateErr;

                    // Inserisci nuovo MVP se selezionato
                    if (mvpId) {
                        await supabaseClient.from('premi').insert({ partita_id: matchId, giocatore_id: mvpId });
                    }

                    // Applica nuove statistiche
                    await applicaStatistiche({ ...partitaData, mvp_id: mvpId }, 1);

                    mostraMessaggio('✅ Partita modificata correttamente');
                } else {
                    // INSERIMENTO NUOVO
                    const { data: nuovaPartita, error: insertErr } = await supabaseClient
                        .from('partite')
                        .insert(partitaData)
                        .select()
                        .single();
                    if (insertErr) throw insertErr;

                    // Inserisci MVP se selezionato
                    if (mvpId) {
                        await supabaseClient.from('premi').insert({ partita_id: nuovaPartita.id, giocatore_id: mvpId });
                    }

                    // Applica statistiche
                    await applicaStatistiche({ ...partitaData, mvp_id: mvpId }, 1);

                    mostraMessaggio('✅ Partita aggiunta');
                }

                resetForm();
                await caricaPartite();
                await caricaSquadre();  // per refresh select se i punti sono cambiati (non necessario ma sicuro)
                await caricaGiocatori();
                aggiornaSelectMVP();
            } catch (error) {
                console.error(error);
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        // -------------------- ELIMINA PARTITA --------------------
        window.eliminaPartita = async function(id) {
            if (!confirm('Eliminare questa partita? Le statistiche verranno rimosse.')) return;

            try {
                // Recupera partita con MVP
                const { data: partita, error } = await supabaseClient
                    .from('partite')
                    .select('*, premi!inner(giocatore_id)')
                    .eq('id', id)
                    .maybeSingle();

                if (error) throw error;

                const partitaConMvp = {
                    ...partita,
                    mvp_id: partita?.premi?.[0]?.giocatore_id || null
                };

                // Rimuovi statistiche
                await applicaStatistiche(partitaConMvp, -1);

                // Elimina MVP associato
                await supabaseClient.from('premi').delete().eq('partita_id', id);

                // Elimina partita
                await supabaseClient.from('partite').delete().eq('id', id);

                mostraMessaggio('✅ Partita eliminata');
                await caricaPartite();
                await caricaSquadre();
                await caricaGiocatori();
                aggiornaSelectMVP();
            } catch (error) {
                console.error(error);
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
            }
        };

        // -------------------- MODIFICA (PREPARA FORM) --------------------
        window.modificaPartita = async function(id) {
            // Carica dati partita e MVP
            const { data: partita, error } = await supabaseClient
                .from('partite')
                .select('*, premi!inner(giocatore_id)')
                .eq('id', id)
                .maybeSingle();

            if (error || !partita) {
                return mostraMessaggio('❌ Partita non trovata', 'error');
            }

            const mvpId = partita.premi?.[0]?.giocatore_id || '';

            // Compila form
            document.getElementById('matchId').value = partita.id;
            document.getElementById('squadraCasa').value = partita.squadra_casa_id;
            document.getElementById('squadraOspite').value = partita.squadra_ospite_id;
            document.getElementById('setCasa').value = partita.set_casa;
            document.getElementById('setOspite').value = partita.set_ospite;
            document.getElementById('dataPartita').value = partita.data.slice(0, 16); // formato datetime-local
            document.getElementById('mvpPartita').value = mvpId;

            document.getElementById('formTitolo').innerText = '✏️ Modifica partita';
            document.getElementById('salvaBtn').innerText = '💾 Aggiorna partita';
            document.getElementById('annullaBtn').style.display = 'inline-block';
        };

        window.resetForm = function() {
            document.getElementById('matchForm').reset();
            document.getElementById('matchId').value = '';
            document.getElementById('formTitolo').innerText = '➕ Nuova partita';
            document.getElementById('salvaBtn').innerText = '💾 Salva partita';
            document.getElementById('annullaBtn').style.display = 'none';
        };

        // -------------------- CARICA ELENCO PARTITE CON AZIONI --------------------
        async function caricaPartite() {
            const { data: partite, error } = await supabaseClient
                .from('partite')
                .select(`
                    id,
                    set_casa,
                    set_ospite,
                    data,
                    squadre!squadra_casa_id (nome),
                    squadre!squadra_ospite_id (nome)
                `)
                .order('data', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            // Recupera MVP per ogni partita
            for (let p of partite) {
                const { data: premi } = await supabaseClient
                    .from('premi')
                    .select('giocatore_id, giocatori(nome)')
                    .eq('partita_id', p.id);
                p.mvp_nome = premi?.length ? premi[0].giocatori.nome : null;
            }

            const container = document.getElementById('listaPartiteAdmin');
            if (!partite.length) {
                container.innerHTML = '<p style="color: #64748b; text-align: center;">Nessuna partita inserita</p>';
                return;
            }

            let html = '';
            partite.forEach(p => {
                const data = new Date(p.data).toLocaleString('it-IT', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                html += `<div class="partita-item">
                    <div class="partita-info">
                        <strong>${p.squadre_casa_id.nome} vs ${p.squadre_ospite_id.nome}</strong>
                        <div style="font-size:1.3rem; font-weight:700; color:#f97316;">${p.set_casa} - ${p.set_ospite}</div>
                        <div style="color:#64748b;">📅 ${data}</div>
                        ${p.mvp_nome ? `<div class="mvp-label">⭐ MVP: ${p.mvp_nome}</div>` : ''}
                    </div>
                    <div class="partita-azioni">
                        <button class="btn-small" onclick="modificaPartita('${p.id}')">✏️ Modifica</button>
                        <button class="btn-small btn-danger" onclick="eliminaPartita('${p.id}')">🗑️ Elimina</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // -------------------- INIZIALIZZAZIONE --------------------
        document.addEventListener('DOMContentLoaded', async () => {
            await caricaSquadre();
            await caricaGiocatori();
            aggiornaSelectSquadre();
            aggiornaSelectMVP();
            await caricaPartite();
        });
    </script>
</body>
</html>
