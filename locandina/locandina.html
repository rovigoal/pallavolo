<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ROVIGOL/PALLAVOLO - Locandina</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI', sans-serif;
            min-height:100vh;
            background:linear-gradient(145deg,#0b2b40 0%,#1e4b5e 100%);
            position:relative;
            padding:20px;
        }
        .volley-bg { position:fixed; width:100%; height:100%; top:0; left:0; z-index:0; }
        .ball { position:absolute; width:80px; height:80px; background:#f9c74f; border-radius:50%; opacity:0.2; animation:float 15s infinite ease-in-out; }
        .ball::after { content:""; position:absolute; top:50%; left:50%; width:100%; height:100%; background:radial-gradient(circle at 30% 30%, white, #f1b24a 70%); border-radius:50%; transform:translate(-50%,-50%); }
        .ball::before { content:""; position:absolute; top:0; left:50%; width:4px; height:100%; background:#333; transform:translateX(-50%) rotate(30deg); border-radius:2px; }
        .ball:nth-child(1) { top:10%; left:5%; width:120px; height:120px; animation-delay:0s; }
        .ball:nth-child(2) { bottom:15%; right:8%; width:180px; height:180px; animation-delay:2s; }
        .ball:nth-child(3) { top:40%; right:20%; width:90px; height:90px; animation-delay:4s; }
        .ball:nth-child(4) { bottom:30%; left:15%; width:150px; height:150px; animation-delay:1s; }
        .ball:nth-child(5) { top:70%; left:40%; width:100px; height:100px; animation-delay:3s; }
        @keyframes float {
            0% { transform:translateY(0px) rotate(0deg); }
            50% { transform:translateY(-30px) rotate(180deg); }
            100% { transform:translateY(0px) rotate(360deg); }
        }
        .container {
            position:relative;
            z-index:10;
            backdrop-filter:blur(8px);
            background:rgba(255,255,255,0.1);
            border-radius:40px;
            padding:30px 40px;
            border:1px solid rgba(255,255,255,0.2);
            box-shadow:0 20px 40px rgba(0,0,0,0.3);
            color:white;
            max-width:1200px;
            margin:0 auto;
        }
        h1 {
            text-align:center;
            font-size:2.5rem;
            margin-bottom:20px;
            background:linear-gradient(135deg,#fff,#ffe5b4);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .sub {
            text-align:center;
            margin-bottom:30px;
            color:#ddd;
        }
        .gallery {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
            gap:20px;
            margin:30px 0;
        }
        .thumbnail {
            aspect-ratio: 16 / 9;
            background:rgba(0,0,0,0.4);
            border-radius:24px;
            overflow:hidden;
            cursor:pointer;
            transition:transform 0.2s, box-shadow 0.2s;
            border:2px solid rgba(255,255,255,0.2);
        }
        .thumbnail:hover {
            transform:scale(1.02);
            box-shadow:0 10px 20px rgba(0,0,0,0.3);
            border-color:#f9c74f;
        }
        .thumbnail img {
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        }
        .modal {
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.9);
            z-index:1000;
            justify-content:center;
            align-items:center;
            cursor:pointer;
        }
        .modal img {
            max-width:90%;
            max-height:90%;
            border-radius:20px;
            box-shadow:0 0 30px rgba(0,0,0,0.5);
            border:3px solid #f9c74f;
        }
        .close-modal {
            position:absolute;
            top:20px;
            right:40px;
            font-size:3rem;
            color:white;
            cursor:pointer;
            font-weight:bold;
            transition:0.2s;
        }
        .close-modal:hover {
            color:#f9c74f;
        }
        .no-images {
            text-align:center;
            padding:40px;
            background:rgba(0,0,0,0.3);
            border-radius:30px;
            margin:20px 0;
        }
        .btn {
            background:#f9c74f;
            border:none;
            padding:12px 30px;
            font-size:1.2rem;
            font-weight:bold;
            color:#0b2b40;
            border-radius:60px;
            cursor:pointer;
            box-shadow:0 5px 0 #b87c2c;
            transition:0.2s;
            display:inline-block;
            text-decoration:none;
            margin-top:20px;
        }
        .btn:hover {
            transform:translateY(-2px);
            box-shadow:0 7px 0 #b87c2c;
            background:#ffe08c;
        }
        .court-lines {
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            height:150px;
            background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,0.1) 40px,rgba(255,255,255,0.1) 80px);
            z-index:5;
            pointer-events:none;
        }
        @media screen and (max-width:768px) {
            body { padding:10px; }
            .container { padding:20px 15px; }
            h1 { font-size:2rem; }
            .gallery { grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:12px; }
            .close-modal { top:15px; right:20px; font-size:2rem; }
            .ball { opacity:0.1; }
            .court-lines { height:60px; }
        }
    </style>
</head>
<body>
    <div class="volley-bg">
        <div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div>
    </div>
    <div class="court-lines"></div>

    <div class="container">
        <h1>📸 ROVIGOL/PALLAVOLO - LOCANDINA</h1>
        <div class="sub">Momenti e eventi della nostra pallavolo</div>

        <div id="galleryContainer" class="gallery"></div>
        <div id="noImagesMsg" class="no-images" style="display:none;"></div>

        <div style="text-align:center;">
            <a href="menu.html" class="btn">← TORNA AL MENU</a>
        </div>
    </div>

    <div id="modal" class="modal">
        <span class="close-modal">&times;</span>
        <img id="modalImage" src="" alt="Immagine ingrandita">
    </div>

    <script>
        // ===== CONFIGURAZIONE =====
        const totalImages = 11;            // numero delle tue foto (da 1 a 11)
        const imageExtension = '.jpeg';    // estensione corretta per i tuoi file
        const imagesPath = 'locandina/';   // cartella dove sono salvate le immagini
        // ==========================

        const gallery = document.getElementById('galleryContainer');
        const noImagesMsg = document.getElementById('noImagesMsg');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImage');
        const closeModal = document.querySelector('.close-modal');

        // Genera i nomi dei file: 1.jpeg, 2.jpeg, ..., 11.jpeg
        const imageFiles = [];
        for (let i = 1; i <= totalImages; i++) {
            imageFiles.push(i + imageExtension);
        }

        let foundAny = false;

        imageFiles.forEach(filename => {
            const imgPath = imagesPath + filename;
            const thumb = document.createElement('div');
            thumb.className = 'thumbnail';
            const img = document.createElement('img');
            img.src = imgPath;
            img.alt = filename;
            img.loading = 'lazy';

            img.onload = () => {
                foundAny = true;
                thumb.appendChild(img);
                gallery.appendChild(thumb);
                noImagesMsg.style.display = 'none';
            };
            img.onerror = () => {
                // immagine non trovata, non facciamo nulla
                console.warn(`Immagine non trovata: ${imgPath}`);
            };
            thumb.addEventListener('click', () => {
                modal.style.display = 'flex';
                modalImg.src = imgPath;
            });
        });

        // Se dopo 1 secondo non c'è nessuna immagine, mostra messaggio
        setTimeout(() => {
            if (gallery.children.length === 0) {
                noImagesMsg.style.display = 'block';
                noImagesMsg.innerHTML = `
                    ⚠️ <strong>Immagini non trovate</strong><br><br>
                    Assicurati che:<br>
                    1️⃣ Esista la cartella <code>locandina</code> nella stessa posizione di questa pagina.<br>
                    2️⃣ Dentro ci siano i file <code>1${imageExtension}, 2${imageExtension}, ... ${totalImages}${imageExtension}</code>.<br>
                    3️⃣ I file siano stati caricati correttamente su GitHub e che l'estensione sia proprio <code>.jpeg</code> (non .jpg).
                `;
            }
        }, 1000);

        // Chiusura modale
        modal.addEventListener('click', () => {
            modal.style.display = 'none';
            modalImg.src = '';
        });
        closeModal.addEventListener('click', () => {
            modal.style.display = 'none';
            modalImg.src = '';
        });
        modalImg.addEventListener('click', (e) => e.stopPropagation());
    </script>
</body>
</html>
