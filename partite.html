<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rovigol Pallavolo - Tutte le partite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%);
            min-height: 100vh;
            color: #1e293b;
        }
        header {
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.3);
        }
        header h1 { font-size: 2.2rem; }
        nav { margin-top: 0.8rem; }
        nav a {
            color: white;
            margin-right: 2rem;
            text-decoration: none;
            font-weight: 500;
            padding: 0.4rem 0;
            border-bottom: 2px solid transparent;
        }
        nav a:hover { border-bottom-color: white; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 2rem; }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.1), 0 0 0 1px rgba(249,115,22,0.1) inset;
        }
        .card h2 {
            font-size: 1.5rem;
            color: #f97316;
            border-bottom: 2px solid #f97316;
            padding-bottom: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .partita-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #f97316;
        }
        .partita-risultato {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f97316;
            margin: 0.3rem 0;
        }
        .partita-data { color: #64748b; font-size: 0.9rem; }
        .partita-mvp { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px dashed #cbd5e1; }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        .pagination button {
            background: #f97316;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }
        .pagination button:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <h1>⚡ Rovigol Pallavolo - Tutte le partite</h1>
        <nav>
            <a href="main.html">← Home</a>
            <a href="admin.html">Admin</a>
            <a href="inserisci-partite.html">➕ Inserisci Partite</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h2>📋 Archivio partite</h2>
            <div id="listaPartite"></div>
            <div class="pagination">
                <button id="prevPage" onclick="cambiaPagina(-1)" disabled>←</button>
                <span id="pageInfo">Pagina 1</span>
                <button id="nextPage" onclick="cambiaPagina(1)" disabled>→</button>
            </div>
        </div>
    </div>

    <script>
        let tutteLePartite = [];
        let paginaCorrente = 0;
        const partitePerPagina = 5;

        async function caricaPartite() {
            const { data: partite, error } = await supabaseClient
                .from('partite')
                .select(`
                    id,
                    set_casa,
                    set_ospite,
                    created_at,
                    squadre!squadra_casa_id (nome),
                    squadre!squadra_ospite_id (nome)
                `)
                .order('created_at', { ascending: false });
            if (error) return console.error(error);

            // Aggiungi MVP
            for (let p of partite) {
                const { data: premi } = await supabaseClient
                    .from('premi')
                    .select('giocatori(nome), voto')
                    .eq('partita_id', p.id);
                if (premi && premi.length) {
                    p.mvp_nome = premi[0].giocatori.nome;
                    p.voto = premi[0].voto;
                }
            }
            tutteLePartite = partite || [];
            paginaCorrente = 0;
            mostraPagina();
        }

        function mostraPagina() {
            const inizio = paginaCorrente * partitePerPagina;
            const fine = inizio + partitePerPagina;
            const partite = tutteLePartite.slice(inizio, fine);

            let html = '';
            if (partite.length === 0) {
                html = '<p style="color: #64748b; text-align: center;">Nessuna partita registrata</p>';
            } else {
                partite.forEach(p => {
                    const data = p.created_at ? new Date(p.created_at).toLocaleString('it-IT') : '';
                    html += `<div class="partita-item">
                        <strong>${p.squadre_casa_id.nome} vs ${p.squadre_ospite_id.nome}</strong>
                        <div class="partita-risultato">${p.set_casa} - ${p.set_ospite}</div>
                        <div class="partita-data">📅 ${data}</div>
                        ${p.mvp_nome ? `<div class="partita-mvp">⭐ MVP: ${p.mvp_nome} (voto ${p.voto})</div>` : ''}
                    </div>`;
                });
            }
            document.getElementById('listaPartite').innerHTML = html;
            aggiornaPaginazione();
        }

        function aggiornaPaginazione() {
            const totale = Math.ceil(tutteLePartite.length / partitePerPagina) || 1;
            document.getElementById('pageInfo').textContent = `Pagina ${paginaCorrente + 1} di ${totale}`;
            document.getElementById('prevPage').disabled = paginaCorrente === 0;
            document.getElementById('nextPage').disabled = paginaCorrente >= totale - 1;
        }

        window.cambiaPagina = (dir) => {
            paginaCorrente += dir;
            mostraPagina();
        };

        // Aggiornamento in tempo reale
        supabaseClient.channel('partite')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'partite' }, caricaPartite)
            .subscribe();

        caricaPartite();
    </script>
</body>
</html>
