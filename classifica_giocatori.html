<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ROVIGOL/PALLAVOLO - Classifica Giocatori</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', sans-serif; min-height:100vh; background:linear-gradient(145deg,#0b2b40 0%,#1e4b5e 100%); padding:20px; position:relative; }
        .volley-bg { position:fixed; width:100%; height:100%; top:0; left:0; z-index:0; }
        .ball { position:absolute; width:80px; height:80px; background:#f9c74f; border-radius:50%; opacity:0.2; animation:float 15s infinite ease-in-out; }
        .ball::after { content:""; position:absolute; top:50%; left:50%; width:100%; height:100%; background:radial-gradient(circle at 30% 30%, white, #f1b24a 70%); border-radius:50%; transform:translate(-50%,-50%); }
        .ball::before { content:""; position:absolute; top:0; left:50%; width:4px; height:100%; background:#333; transform:translateX(-50%) rotate(30deg); border-radius:2px; }
        .ball:nth-child(1) { top:10%; left:5%; width:120px; height:120px; animation-delay:0s; }
        .ball:nth-child(2) { bottom:15%; right:8%; width:180px; height:180px; animation-delay:2s; }
        .ball:nth-child(3) { top:40%; right:20%; width:90px; height:90px; animation-delay:4s; }
        .ball:nth-child(4) { bottom:30%; left:15%; width:150px; height:150px; animation-delay:1s; }
        .ball:nth-child(5) { top:70%; left:40%; width:100px; height:100px; animation-delay:3s; }
        @keyframes float { 0% { transform:translateY(0px) rotate(0deg); } 50% { transform:translateY(-30px) rotate(180deg); } 100% { transform:translateY(0px) rotate(360deg); } }
        .container { position:relative; z-index:10; backdrop-filter:blur(8px); background:rgba(255,255,255,0.1); border-radius:40px; padding:40px 50px; border:1px solid rgba(255,255,255,0.2); box-shadow:0 20px 40px rgba(0,0,0,0.3); color:white; max-width:800px; margin:0 auto; }
        h1 { text-align:center; font-size:2.5rem; margin-bottom:40px; background:linear-gradient(135deg,#fff,#ffe5b4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .table-wrapper { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th { background:rgba(249,199,79,0.3); padding:15px; font-weight:600; text-transform:uppercase; }
        td { padding:12px; border-bottom:1px solid rgba(255,255,255,0.1); text-align:center; }
        .back-link { display:block; text-align:center; margin-top:30px; color:rgba(255,255,255,0.7); text-decoration:none; }
        .back-link:hover { color:white; text-decoration:underline; }
        @media screen and (max-width:768px) {
            body { padding:10px; }
            .container { padding:20px 15px !important; width:100% !important; max-width:100% !important; margin:10px auto !important; }
            h1 { font-size:2rem !important; margin-bottom:20px; }
            table { min-width:600px; }
            th, td { padding:10px 5px; font-size:0.9rem; }
            .ball { opacity:0.1; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="volley-bg">
        <div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div>
    </div>
    <div class="container">
        <h1>🌟 ROVIGOL/PALLAVOLO - CLASSIFICA GIOCATORI 🌟</h1>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Pos</th><th>Giocatore</th><th>Squadra</th><th>Punti Totali</th></tr></thead>
                <tbody id="classificaBody"></tbody>
            </table>
        </div>
        <a href="menu.html" class="back-link">← Torna al menu</a>
    </div>
    <script>
        const SUPABASE_URL = 'https://ojzdxhukqhnrobpxxvlh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qemR4aHVrcWhucm9icHh4dmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Nzc5NDIsImV4cCI6MjA4ODM1Mzk0Mn0.N47R33pZ54dyoLyLqZfjfBkXyRYgWal0y-NwJKjM0XI';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadClassifica() {
            const { data: giocatori, error: errG } = await supabaseClient
                .from('giocatori')
                .select('id, nome, cognome, squadre(nome)');
            if (errG) return console.error(errG);

            const { data: partite, error: errP } = await supabaseClient
                .from('partite')
                .select('miglior_giocatore_id, punti_miglior_giocatore');
            if (errP) return console.error(errP);

            const puntiMap = {};
            giocatori.forEach(g => puntiMap[g.id] = 0);

            partite.forEach(p => {
                if (p.miglior_giocatore_id && p.punti_miglior_giocatore) {
                    puntiMap[p.miglior_giocatore_id] = (puntiMap[p.miglior_giocatore_id] || 0) + p.punti_miglior_giocatore;
                }
            });

            const classifica = giocatori.map(g => ({
                nomeCompleto: `${g.nome} ${g.cognome}`,
                squadra: g.squadre ? g.squadre.nome : '—',
                punti: puntiMap[g.id] || 0
            })).sort((a,b) => b.punti - a.punti);

            const tbody = document.getElementById('classificaBody');
            tbody.innerHTML = '';
            classifica.forEach((g, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${idx+1}</td><td>${g.nomeCompleto}</td><td>${g.squadra}</td><td>${g.punti}</td>`;
                tbody.appendChild(tr);
            });
        }

        window.onload = loadClassifica;
    </script>
</body>
</html>
