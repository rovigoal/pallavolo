<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Test Locandina</title>
</head>
<body>
    <h1>Test lettura file</h1>
    <div id="output"></div>
    <script>
        fetch('locandina/1.jpeg')
            .then(res => res.text())
            .then(text => {
                document.getElementById('output').innerHTML = `<pre>Contenuto di 1.jpeg:\n${text}</pre>`;
            })
            .catch(err => {
                document.getElementById('output').innerHTML = `Errore: ${err.message}`;
            });
    </script>
</body>
</html>
