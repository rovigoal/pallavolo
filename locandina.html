<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROVIGOL/PALLAVOLO - Locandina</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI', sans-serif;
            min-height:100vh;
            background:linear-gradient(145deg,#0b2b40 0%,#1e4b5e 100%);
            padding:20px;
        }
        .container {
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(8px);
            border-radius:40px;
            padding:30px;
            max-width:1200px;
            margin:0 auto;
            color:white;
        }
        h1 { text-align:center; margin-bottom:20px; }
        .gallery {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
            gap:20px;
            margin:30px 0;
        }
        .thumbnail {
            aspect-ratio:16/9;
            background:#00000055;
            border-radius:24px;
            overflow:hidden;
            cursor:pointer;
            border:2px solid rgba(255,255,255,0.3);
            transition:0.2s;
        }
        .thumbnail:hover { transform:scale(1.02); border-color:#f9c74f; }
        .thumbnail img { width:100%; height:100%; object-fit:cover; }
        .modal {
            display:none;
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.9);
            z-index:1000;
            justify-content:center;
            align-items:center;
            cursor:pointer;
        }
        .modal img { max-width:90%; max-height:90%; border-radius:20px; border:3px solid #f9c74f; }
        .close { position:absolute; top:20px; right:40px; font-size:3rem; color:white; cursor:pointer; }
        .btn { background:#f9c74f; padding:12px 30px; border-radius:60px; text-decoration:none; color:#0b2b40; display:inline-block; margin-top:20px; }
        @media (max-width:768px) { .gallery { grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); } }
    </style>
</head>
<body>
<div class="container">
    <h1>📸 LOCANDINA - FOTO</h1>
    <div id="gallery" class="gallery"></div>
    <div style="text-align:center"><a href="menu.html" class="btn">← TORNA AL MENU</a></div>
</div>
<div id="modal" class="modal"><span class="close">&times;</span><img id="modalImg" src=""></div>

<script>
    (function() {
        // CONFIGURAZIONE
        const total = 11;               // quante foto (1 a 11)
        const ext = '.jpeg';            // estensione corretta
        const cartella = 'locandina/';  // cartella dove stanno le foto

        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const closeSpan = document.querySelector('.close');

        // Pulisce la galleria (per sicurezza)
        gallery.innerHTML = '';

        // Ciclo da 1 a total
        for (let i = 1; i <= total; i++) {
            const imgPath = cartella + i + ext;
            const thumb = document.createElement('div');
            thumb.className = 'thumbnail';
            const img = document.createElement('img');
            img.src = imgPath;
            img.alt = 'Foto ' + i;

            // Se l'immagine non viene trovata, mostriamo un placeholder (non nascondiamo)
            img.onerror = function() {
                this.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23333"/%3E%3Ctext x="50" y="55" font-size="14" text-anchor="middle" fill="%23aaa"%3E%3F%3C/text%3E%3C/svg%3E';
                this.style.objectFit = 'contain';
            };

            thumb.appendChild(img);
            thumb.onclick = function() {
                modal.style.display = 'flex';
                modalImg.src = imgPath;
            };
            gallery.appendChild(thumb);
        }

        // Chiusura modale
        function chiudiModale() {
            modal.style.display = 'none';
        }
        modal.onclick = chiudiModale;
        closeSpan.onclick = chiudiModale;
        modalImg.onclick = function(e) { e.stopPropagation(); };
    })();
</script>
</body>
</html>
