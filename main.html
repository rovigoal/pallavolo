<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Rovigol Pallavolo - Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <header>
        <h1>Rovigol Pallavolo</h1>
        <nav>
            <a href="main.html">Home</a>
            <a href="admin.html">Admin</a>
        </nav>
    </header>

    <main class="container">
        <!-- Riquadro Classifica Squadre -->
        <section class="riquadro" id="classifica">
            <h2>Classifica Squadre</h2>
            <table id="tabellaClassifica">
                <thead>
                    <tr>
                        <th>Squadra</th>
                        <th>Punti</th>
                        <th>Giocate</th>
                        <th>Vinte</th>
                        <th>Perse</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- Riquadro Ultime Partite -->
        <section class="riquadro" id="ultime-partite">
            <h2>Ultime partite</h2>
            <div id="listaPartite"></div>
        </section>

        <!-- Riquadro Classifica Giocatori -->
        <section class="riquadro" id="classifica-giocatori">
            <h2>Classifica Giocatori</h2>
            <table id="tabellaGiocatori">
                <thead>
                    <tr>
                        <th>Giocatore</th>
                        <th>Squadra</th>
                        <th>Voto</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

    <script>
        // Riferimenti agli elementi
        const classificaBody = document.querySelector('#tabellaClassifica tbody');
        const listaPartiteDiv = document.getElementById('listaPartite');
        const classificaGiocatoriBody = document.querySelector('#tabellaGiocatori tbody');

        // Carica classifica squadre in tempo reale
        function caricaClassifica() {
            supabaseClient
                .channel('squadre-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'squadre' }, () => fetchClassifica())
                .subscribe();
            fetchClassifica();
        }

        async function fetchClassifica() {
            const { data: squadre, error } = await supabaseClient
                .from('squadre')
                .select('*')
                .order('punti', { ascending: false });

            if (error) console.error(error);
            else {
                let html = '';
                squadre.forEach(s => {
                    html += `<tr>
                        <td>${s.nome}</td>
                        <td>${s.punti}</td>
                        <td>${s.partite_giocate}</td>
                        <td>${s.vinte}</td>
                        <td>${s.perse}</td>
                    </tr>`;
                });
                classificaBody.innerHTML = html;
            }
        }

        // Carica ultime partite in tempo reale
        function caricaPartite() {
            supabaseClient
                .channel('partite-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'partite' }, () => fetchPartite())
                .subscribe();
            fetchPartite();
        }

        async function fetchPartite() {
            const { data: partite, error } = await supabaseClient
                .from('partite')
                .select(`
                    id,
                    set_casa,
                    set_ospite,
                    data,
                    squadra_casa_id,
                    squadra_ospite_id,
                    squadre!squadra_casa_id (nome),
                    squadre!squadra_ospite_id (nome)
                `)
                .order('data', { ascending: false })
                .limit(5);

            if (error) console.error(error);
            else {
                let html = '';
                partite.forEach(p => {
                    const data = new Date(p.data).toLocaleDateString('it-IT');
                    html += `<div class="partita">
                        <strong>${p.squadre_casa_id.nome} vs ${p.squadre_ospite_id.nome}</strong><br>
                        ${p.set_casa} - ${p.set_ospite} (${data})
                    </div>`;
                });
                listaPartiteDiv.innerHTML = html;
            }
        }

        // Carica classifica giocatori
        function caricaClassificaGiocatori() {
            supabaseClient
                .channel('giocatori-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'giocatori' }, () => fetchGiocatori())
                .subscribe();
            fetchGiocatori();
        }

        async function fetchGiocatori() {
            const { data: giocatori, error } = await supabaseClient
                .from('giocatori')
                .select('nome, voto, squadre!inner(nome)')
                .order('voto', { ascending: false });

            if (error) console.error(error);
            else {
                let html = '';
                giocatori.forEach(g => {
                    html += `<tr>
                        <td>${g.nome}</td>
                        <td>${g.squadre.nome}</td>
                        <td>${g.voto !== null ? g.voto : 'N/D'}</td>
                    </tr>`;
                });
                classificaGiocatoriBody.innerHTML = html;
            }
        }

        // Avvia tutto
        caricaClassifica();
        caricaPartite();
        caricaClassificaGiocatori();
    </script>
</body>
</html>
