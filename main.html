<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Rovigol Pallavolo - Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        /* Rendi la classifica più grande */
        #classifica {
            flex: 2 1 600px; /* Più grande degli altri */
        }
        #ultime-partite {
            flex: 1 1 300px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Rovigol Pallavolo</h1>
        <nav>
            <a href="main.html">Home</a>
            <a href="admin.html">Admin</a>
        </nav>
    </header>

    <main class="container">
        <!-- Riquadro Classifica Squadre (più grande) -->
        <section class="riquadro" id="classifica">
            <h2>Classifica Squadre</h2>
            <table id="tabellaClassifica">
                <thead>
                    <tr>
                        <th>Squadra</th>
                        <th>Punti</th>
                        <th>Giocate</th>
                        <th>Vinte</th>
                        <th>Perse</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- Riquadro Ultime Partite -->
        <section class="riquadro" id="ultime-partite">
            <h2>Ultime partite</h2>
            <div id="listaPartite"></div>
        </section>
    </main>

    <script>
        const classificaBody = document.querySelector('#tabellaClassifica tbody');
        const listaPartiteDiv = document.getElementById('listaPartite');

        function caricaClassifica() {
            supabaseClient
                .channel('squadre-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'squadre' }, () => fetchClassifica())
                .subscribe();
            fetchClassifica();
        }

        async function fetchClassifica() {
            const { data: squadre, error } = await supabaseClient
                .from('squadre')
                .select('*')
                .order('punti', { ascending: false });

            if (error) console.error(error);
            else {
                let html = '';
                squadre.forEach(s => {
                    html += `<tr>
                        <td><strong>${s.nome}</strong></td>
                        <td>${s.punti}</td>
                        <td>${s.partite_giocate}</td>
                        <td>${s.vinte}</td>
                        <td>${s.perse}</td>
                    </tr>`;
                });
                classificaBody.innerHTML = html;
            }
        }

        function caricaPartite() {
            supabaseClient
                .channel('partite-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'partite' }, () => fetchPartite())
                .subscribe();
            fetchPartite();
        }

        async function fetchPartite() {
            const { data: partite, error } = await supabaseClient
                .from('partite')
                .select(`
                    id,
                    set_casa,
                    set_ospite,
                    data,
                    squadra_casa_id,
                    squadra_ospite_id,
                    squadre!squadra_casa_id (nome),
                    squadre!squadra_ospite_id (nome)
                `)
                .order('data', { ascending: false })
                .limit(5);

            if (error) console.error(error);
            else {
                let html = '';
                for (const p of partite) {
                    const data = new Date(p.data).toLocaleDateString('it-IT');
                    
                    // Cerca il miglior giocatore per questa partita
                    const { data: premi } = await supabaseClient
                        .from('premi')
                        .select('giocatori!inner(nome)')
                        .eq('partita_id', p.id);
                    
                    let migliore = '';
                    if (premi && premi.length > 0) {
                        migliore = `<br><small>⭐ Migliore: ${premi[0].giocatori.nome}</small>`;
                    }
                    
                    html += `<div class="partita">
                        <strong>${p.squadre_casa_id.nome} vs ${p.squadre_ospite_id.nome}</strong><br>
                        ${p.set_casa} - ${p.set_ospite} (${data})${migliore}
                    </div>`;
                }
                listaPartiteDiv.innerHTML = html;
            }
        }

        caricaClassifica();
        caricaPartite();
    </script>
</body>
</html>
