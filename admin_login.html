<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI', sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(145deg,#0b2b40 0%,#1e4b5e 100%);
            position:relative;
            overflow:hidden;
        }
        .volley-bg {
            position:absolute;
            width:100%;
            height:100%;
            top:0;
            left:0;
            z-index:0;
        }
        .ball {
            position:absolute;
            width:80px;
            height:80px;
            background:#f9c74f;
            border-radius:50%;
            opacity:0.2;
            animation:float 15s infinite ease-in-out;
        }
        .ball::after {
            content:"";
            position:absolute;
            top:50%;
            left:50%;
            width:100%;
            height:100%;
            background:radial-gradient(circle at 30% 30%, white, #f1b24a 70%);
            border-radius:50%;
            transform:translate(-50%,-50%);
        }
        .ball::before {
            content:"";
            position:absolute;
            top:0;
            left:50%;
            width:4px;
            height:100%;
            background:#333;
            transform:translateX(-50%) rotate(30deg);
            border-radius:2px;
        }
        .ball:nth-child(1) { top:10%; left:5%; width:120px; height:120px; animation-delay:0s; }
        .ball:nth-child(2) { bottom:15%; right:8%; width:180px; height:180px; animation-delay:2s; }
        .ball:nth-child(3) { top:40%; right:20%; width:90px; height:90px; animation-delay:4s; }
        .ball:nth-child(4) { bottom:30%; left:15%; width:150px; height:150px; animation-delay:1s; }
        .ball:nth-child(5) { top:70%; left:40%; width:100px; height:100px; animation-delay:3s; }
        @keyframes float {
            0% { transform:translateY(0px) rotate(0deg); }
            50% { transform:translateY(-30px) rotate(180deg); }
            100% { transform:translateY(0px) rotate(360deg); }
        }
        .login-container {
            position:relative;
            z-index:10;
            text-align:center;
            color:white;
            backdrop-filter:blur(8px);
            background:rgba(255,255,255,0.1);
            padding:40px 60px;
            border-radius:40px;
            border:1px solid rgba(255,255,255,0.2);
            box-shadow:0 20px 40px rgba(0,0,0,0.3);
        }
        h2 {
            font-size:2.5rem;
            margin-bottom:30px;
            background:linear-gradient(135deg,#fff,#ffe5b4);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        input {
            width:100%;
            padding:15px 20px;
            margin-bottom:20px;
            border:none;
            border-radius:60px;
            background:rgba(255,255,255,0.2);
            color:white;
            font-size:1.2rem;
            outline:2px solid transparent;
        }
        input:focus {
            outline:2px solid #f9c74f;
        }
        .btn {
            background:#f9c74f;
            border:none;
            padding:15px 40px;
            font-size:1.5rem;
            font-weight:bold;
            color:#0b2b40;
            border-radius:60px;
            cursor:pointer;
            box-shadow:0 5px 0 #b87c2c;
            transition:0.2s;
            width:100%;
        }
        .btn:hover {
            transform:translateY(-2px);
            box-shadow:0 7px 0 #b87c2c;
            background:#ffe08c;
        }
        .error {
            color:#ff6b6b;
            margin-top:10px;
        }
        .back-link {
            display:block;
            margin-top:20px;
            color:rgba(255,255,255,0.7);
            text-decoration:none;
        }
        .back-link:hover {
            color:white;
        }
        /* Responsive */
        @media screen and (max-width:768px) {
            body {
                padding:10px;
                overflow:auto;
                height:auto;
                min-height:100vh;
            }
            .login-container {
                padding:20px 15px !important;
                width:100% !important;
                margin:10px auto !important;
            }
            h2 {
                font-size:2rem !important;
                margin-bottom:20px;
            }
            input, .btn {
                font-size:1rem !important;
                padding:12px 15px;
            }
            .ball {
                opacity:0.1;
            }
        }
    </style>
</head>
<body>
    <div class="volley-bg">
        <div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div>
    </div>
    <div class="login-container">
        <h2>🔐 ACCESSO ADMIN</h2>
        <form id="loginForm">
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn">ENTRA</button>
            <div id="errorMsg" class="error"></div>
        </form>
        <a href="menu.html" class="back-link">← Torna al menu</a>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pwd = document.getElementById('password').value;
            if (pwd === '123') {
                window.location.href = 'admin_panel.html';
            } else {
                document.getElementById('errorMsg').textContent = 'Password errata. Riprova.';
            }
        });
    </script>
</body>
</html>
